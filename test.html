<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#f5f7fa;}

#dashboard{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
padding:30px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card i{
font-size:45px;
color:#4285F4;
margin-bottom:10px;
}
</style>
</head>

<body>

<div id="dashboard">

<div class="grid">

<div class="card"><i class="fas fa-search"></i><h3>Consultar Tickets</h3></div>
<div class="card"><i class="fas fa-paper-plane"></i><h3>Enviar Tickets</h3></div>
<div class="card"><i class="fas fa-tools"></i><h3>Administrar Tickets</h3></div>

<div class="card"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
<div class="card"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
<div class="card"><i class="fas fa-calendar"></i><h3>Calendario</h3></div>
<div class="card"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
<div class="card"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
<div class="card"><i class="fas fa-print"></i><h3>Impresoras</h3></div>

</div>

</div>

</body>
</html>
