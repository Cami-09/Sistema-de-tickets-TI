<!DOCTYPE html>

<html>
<head>
  <title>Tickets PRO</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <script src="firebase.js"></script>

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .center {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card {
      background:white;
      padding:25px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      margin:10px 0;
    }

    .login-card {
      width:320px;
      text-align:center;
      animation: fadeIn 0.5s ease;
    }

    .google-btn {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:white;
      border:1px solid #ddd;
      padding:12px;
      border-radius:8px;
      cursor:pointer;
      font-weight:bold;
      transition:0.3s;
    }

    .google-btn:hover {
      background:#f1f1f1;
      transform:scale(1.03);
    }

    .container {
      padding:20px;
      background:#eef1f5;
      min-height:100vh;
    }

    input, select {
      padding:8px;
      margin:5px 0;
      width:100%;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      padding:8px 12px;
      border:none;
      border-radius:6px;
      background:#4facfe;
      color:white;
      cursor:pointer;
    }

    button:hover {
      opacity:0.9;
    }

    .badge {
      padding:4px 8px;
      border-radius:6px;
      background:#ddd;
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>

</head>

<body>

<!-- LOGIN -->

<div id="loginView" class="center">
  <div class="card login-card">
    <h2>🎫 Tickets PRO</h2>
    <p>Inicia sesión con Google</p>

```
<div class="google-btn" onclick="login()">
  <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" width="20">
  Iniciar sesión con Google
</div>

<p id="error" style="color:red;"></p>
```

  </div>
</div>

<!-- APP -->

<div id="appView" style="display:none" class="container">

<button onclick="logout()">Cerrar sesión</button>

  <p id="userInfo"></p>

  <!-- ADMIN -->

  <div id="adminPanel" class="card" style="display:none">
    <h3>👑 Usuarios</h3>

```
<input id="emailUser" placeholder="Email">
<select id="rolUser">
  <option value="usuario">usuario</option>
  <option value="tecnico">tecnico</option>
  <option value="admin">admin</option>
</select>
<button onclick="guardarRol()">Guardar</button>

<div id="listaUsuarios"></div>
```

  </div>

  <!-- CREAR -->

  <div class="card">
    <input id="titulo" placeholder="Título">
    <input id="desc" placeholder="Descripción">

```
<select id="prioridad">
  <option>baja</option>
  <option>media</option>
  <option>alta</option>
</select>

<input type="file" id="file">
<button onclick="crear()">Crear Ticket</button>
```

  </div>

  <div id="lista"></div>

</div>

<script>
let currentUser, currentRole;
const provider = new firebase.auth.GoogleAuthProvider();

// LOGIN
async function login() {
  try {
    await auth.signInWithPopup(provider);
  } catch (e) {
    console.error("ERROR REAL:", e);
    alert(e.message); // 👈 MUY IMPORTANTE
  }
}
// LOGOUT
function logout() {
  auth.signOut();
}

// ROL
async function getRole(email) {
  const doc = await db.collection("roles").doc(email).get();
  return doc.exists ? doc.data().rol : "usuario";
}

// GUARDAR ROL
async function guardarRol() {
  const email = emailUser.value.trim();
  const rol = rolUser.value;

  if (!email) {
    alert("Ingresa un email");
    return;
  }

  await db.collection("roles").doc(email).set({
    rol: rol
  });

  alert("Rol asignado correctamente");

  emailUser.value = "";
  cargarUsuarios();
}

// LISTA USUARIOS
async function cargarUsuarios() {
  const snap = await db.collection("roles").get();
  listaUsuarios.innerHTML = "<h4>Usuarios:</h4>";

  snap.forEach(doc => {
    const data = doc.data();

    listaUsuarios.innerHTML += `
      <div style="margin:5px 0;">
        📧 ${doc.id} → <b>${data.rol}</b>
      </div>
    `;
  });
}

// SESIÓN
auth.onAuthStateChanged(async user => {
  if (!user) {
    loginView.style.display = "flex";
    appView.style.display = "none";
    return;
  }

  currentUser = user;
  currentRole = await getRole(user.email);

  loginView.style.display = "none";
  appView.style.display = "block";

  userInfo.innerText = user.email + " (" + currentRole + ")";

  if (currentRole === "admin") {
    adminPanel.style.display = "block";
    cargarUsuarios();
  }

  cargar();
});

// CREAR
async function crear() {
  let url = "";
  const f = file.files[0];

  if (f) {
    const ref = storage.ref("tickets/" + Date.now());
    await ref.put(f);
    url = await ref.getDownloadURL();
  }

  await db.collection("tickets").add({
    titulo: titulo.value,
    descripcion: desc.value,
    estado: "abierto",
    prioridad: prioridad.value,
    usuario: currentUser.email,
    tecnico: "",
    adjunto: url,
    fecha: new Date(),
    historial: []
  });
}

// CARGAR
function cargar() {

  let query = db.collection("tickets");

  // 🔥 FILTROS SEGÚN ROL
  if (currentRole === "usuario") {
    query = query.where("usuario", "==", currentUser.email);
  }

  if (currentRole === "tecnico") {
    // ve tickets asignados a él o sin asignar
    query = query.where("tecnico", "in", ["", currentUser.email]);
  }

  // admin no filtra (ve todo)

  query.onSnapshot(snapshot => {
    lista.innerHTML = "";

    snapshot.forEach(doc => {
      const t = doc.data();

      lista.innerHTML += `
        <div class="card">
          <b>${t.titulo}</b>
          <span class="badge">${t.prioridad}</span><br>

          ${t.descripcion}<br>
          Estado: ${t.estado}<br>
          Técnico: ${t.tecnico || "Sin asignar"}<br>

          ${t.adjunto ? `<a href="${t.adjunto}" target="_blank">Ver archivo</a>` : ""}

          <br><br>
          ${acciones(doc.id)}

          <input id="c-${doc.id}" placeholder="Comentario">
          <button onclick="comentar('${doc.id}')">Enviar</button>
        </div>
      `;
    });
  });
}
// ACCIONES
function acciones(id) {
  let b = "";

  if (currentRole === "admin" || currentRole === "tecnico") {
    b += `<button onclick="asignar('${id}')">Asignarme</button>`;
    b += `<button onclick="estado('${id}','proceso')">Proceso</button>`;
    b += `<button onclick="estado('${id}','cerrado')">Cerrar</button>`;
  }

  return b;
}

function asignar(id) {
  actualizar(id, { tecnico: currentUser.email }, "Asignado");
}

function estado(id, e) {
  actualizar(id, { estado: e }, "Cambio a " + e);
}

// ACTUALIZAR
async function actualizar(id, cambios, accion) {
  const ref = db.collection("tickets").doc(id);
  const doc = await ref.get();

  const historial = doc.data().historial || [];

  historial.push({
    accion,
    usuario: currentUser.email,
    fecha: new Date()
  });

  await ref.update({ ...cambios, historial });
}

// COMENTAR
function comentar(id) {
  const texto = document.getElementById("c-"+id).value;

  db.collection("tickets").doc(id).collection("comentarios").add({
    texto,
    usuario: currentUser.email,
    fecha: new Date()
  });
}
</script>

</body>
</html>
