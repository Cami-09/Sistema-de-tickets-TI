<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Tickets TI</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* FONDO */
body{
margin:0;
font-family:Arial;
background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center/cover;
}

/* CAPA OSCURA */
.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:20px;
}

/* HEADER */
header{
color:white;
display:flex;
justify-content:space-between;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:80vh;
color:white;
}

#login button{
padding:12px 20px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
}

/* DASHBOARD */
#dashboard{display:none;}

.grid{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:60px;
}

.card{
background:white;
padding:20px;
width:220px;
border-radius:12px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
transition:.3s;
}

.card:hover{transform:scale(1.05);}

.card i{
font-size:30px;
color:#2563eb;
}

/* MODULOS */
.modulo{
display:none;
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}

/* FORM */
textarea, select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

.btn{
background:#2563eb;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ADMIN */
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.badge{
padding:5px 10px;
border-radius:20px;
color:white;
font-size:12px;
}

.abierto{background:green;}
.enproceso{background:orange;}
.cerrado{background:red;}

button{
cursor:pointer;
border:none;
padding:6px 10px;
margin:2px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="overlay">

<header>
<h2>🎫 Sistema Tickets TI</h2>
<button onclick="logout()">Salir</button>
</header>

<!-- LOGIN -->
<div id="login">
<h2>Iniciar sesión</h2>
<button onclick="login()">Ingresar con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div id="panel" class="grid">

<div class="card" onclick="abrir('consultar')">
<i class="fas fa-search"></i>
<h3>Ver Tickets</h3>
<p>Ver el estado de tus tickets</p>
</div>

<div class="card" onclick="abrir('crear')">
<i class="fas fa-paper-plane"></i>
<h3>Enviar Ticket</h3>
<p>Reportar problema</p>
</div>

<div class="card" onclick="abrir('admin')">
<i class="fas fa-clipboard-list"></i>
<h3>Administrar Tickets</h3>
<p>Gestionar tickets</p>
</div>

</div>

<!-- CREAR -->
<div id="crear" class="modulo">
<button onclick="volver()">⬅ Volver</button>
<h2>Crear Ticket</h2>

<select id="dependencia">
<option>Sistemas</option>
<option>Administración</option>
</select>

<select id="tipo">
<option>Soporte</option>
<option>Mantenimiento</option>
</select>

<textarea id="descripcion" placeholder="Describe el problema"></textarea>

<select id="prioridad">
<option>Baja</option>
<option>Media</option>
<option>Alta</option>
</select>

<button class="btn" onclick="crearTicket()">Crear</button>
</div>

<!-- CONSULTAR -->
<div id="consultar" class="modulo">
<button onclick="volver()">⬅ Volver</button>
<h2>Mis Tickets</h2>
<div id="lista"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="modulo">
<button onclick="volver()">⬅ Volver</button>
<h2>Administrar Tickets</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Tipo</th>
<th>Estado</th>
<th>Usuario</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaAdmin"></tbody>
</table>

</div>

</div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
authDomain:"sistema-de-tickets-ti-b12f5.firebaseapp.com",
projectId:"sistema-de-tickets-ti-b12f5"
});

const auth = firebase.auth();
const db = firebase.firestore();
let user;

// LOGIN
function login(){
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider)
.then(res=>mostrar(res.user))
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(u=>{
if(u) mostrar(u);
});

function mostrar(u){
user=u;
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
}

// NAV
function abrir(id){
document.getElementById("panel").style.display="none";
document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
document.getElementById(id).style.display="block";

if(id==="consultar") cargarTickets();
if(id==="admin") cargarAdmin();
}

function volver(){
document.getElementById("panel").style.display="flex";
document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
}

// CREAR
async function crearTicket(){
await db.collection("tickets").add({
tipo: tipo.value,
descripcion: descripcion.value,
dependencia: dependencia.value,
prioridad: prioridad.value,
usuario: user.email,
estado:"abierto"
});
alert("Ticket creado");
}

// CONSULTAR
function cargarTickets(){
db.collection("tickets")
.where("usuario","==",user.email)
.onSnapshot(snap=>{
lista.innerHTML="";
snap.forEach(doc=>{
const t=doc.data();
lista.innerHTML+=`<div>${t.tipo} - ${t.estado}</div>`;
});
});
}

// ADMIN
function cargarAdmin(){
db.collection("tickets").onSnapshot(snap=>{
tablaAdmin.innerHTML="";

snap.forEach(doc=>{
const t=doc.data();
const id=doc.id;

let clase = t.estado=="abierto"?"abierto":t.estado=="en proceso"?"enproceso":"cerrado";

tablaAdmin.innerHTML+=`
<tr>
<td>${id.substring(0,5)}</td>
<td>${t.tipo}</td>
<td><span class="badge ${clase}">${t.estado}</span></td>
<td>${t.usuario}</td>
<td>
<button onclick="verTicket('${id}')">👁</button>
<button onclick="enProceso('${id}')">⏳</button>
<button onclick="cerrarTicket('${id}')">✅</button>
<button onclick="reasignar('${id}')">🔄</button>
<button onclick="eliminar('${id}')">🗑</button>
</td>
</tr>
`;
});
});
}

// ACCIONES
function verTicket(id){
db.collection("tickets").doc(id).get().then(doc=>{
const t=doc.data();
alert(t.descripcion);
});
}

function enProceso(id){
db.collection("tickets").doc(id).update({estado:"en proceso"});
}

function cerrarTicket(id){
db.collection("tickets").doc(id).update({estado:"cerrado"});
}

function eliminar(id){
if(confirm("Eliminar?")){
db.collection("tickets").doc(id).delete();
}
}

function reasignar(id){
const nuevo = prompt("Nuevo correo:");
if(!nuevo) return;
db.collection("tickets").doc(id).update({usuario:nuevo});
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

</script>

</body>
</html>
