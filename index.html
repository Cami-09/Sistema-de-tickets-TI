<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema TIC - Uniciencia</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }

        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }

        .modulo { display: none; background: white; padding: 25px; border-radius: 12px; min-height: 450px; }
        .filtros-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-filtros { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
        .resumen-celeste { background: #e0f2fe; padding: 12px; border-radius: 8px; color: #0369a1; margin-bottom: 15px; text-align: center; font-weight: 500; }

        input, select, textarea { padding: 9px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 0.9rem; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 15px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        /* ICONOS DE ACCIONES */
        .btn-acc { width: 30px; height: 30px; border-radius: 4px; border: none; color: white; cursor: pointer; margin-right: 2px; font-size: 12px; }
        .bg-edit { background: #f59e0b; }
        .bg-tools { background: #2563eb; }
        .bg-copy { background: #06b6d4; }
        .bg-view { background: #00bcd4; }
        .bg-delete { background: #ef4444; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 85%; max-width: 850px; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
        .grid-modal { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #64748b; }

        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #64748b; color: white; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white; padding:5px 12px;">Salir</button>
</header>

<div id="login" style="display:flex; height:80vh; justify-content:center; align-items:center;">
    <button class="btn btn-blue" onclick="login()">Ingresar con Google</button>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" onclick="abrir('inv_admin')"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
        <div class="card" onclick="abrir('inv_salas')"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
    </div>

    <div id="modulo_inv" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="volver()" class="btn btn-gray">⬅ Volver</button>
            <h2 id="titulo_inv" style="color:var(--primary); margin:0;"></h2>
            <button class="btn btn-blue" onclick="abrirModalRegistro()">+ Registrar nuevo equipo</button>
        </div>
        <div id="resumen_conteo" class="resumen-celeste" style="margin-top:15px;"></div>
        <div class="filtros-box">
            <div class="grid-filtros" id="filtrosInputs">
                <input type="text" id="f_pc" placeholder="PC" onkeyup="filtrar()">
                <input type="text" id="f_inv" placeholder="Inventario" onkeyup="filtrar()">
                <input type="text" id="f_res" placeholder="Responsable" onkeyup="filtrar()">
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>PC</th><th>Tipo</th><th>Modelo</th><th>Inventario</th><th>Responsable</th><th>Dependencia</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tablaData"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalEquipo" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModales()">&times;</span>
        <h2 id="modalTitle">Registrar nuevo equipo</h2>
        <div class="grid-modal" id="formEquipo">
            <input type="text" id="n_pc" placeholder="PC">
            <select id="n_tipo"><option value="">Tipo</option><option>AIO</option><option>Portátil</option><option>Torre</option></select>
            <input type="text" id="n_mod" placeholder="Modelo">
            <input type="text" id="n_inv" placeholder="Inventario">
            <select id="n_so"><option>Windows 10</option><option>Windows 11</option></select>
            <input type="text" id="n_proc" placeholder="Procesador">
            <select id="n_ram"><option>8 GB</option><option>16 GB</option><option>32 GB</option></select>
            <input type="text" id="n_disco" placeholder="Disco">
            <input type="text" id="n_ip" placeholder="IP">
            <input type="text" id="n_term" placeholder="Terminal">
            <input type="text" id="n_res" placeholder="Responsable">
            <select id="n_dep"><option>Sistemas</option><option>Tesorería</option><option>Auditorio menor</option></select>
            <input type="text" id="n_correo" placeholder="Correo">
            <select id="n_cam"><option>Bucaramanga</option></select>
            <select id="n_sed"><option>Sede A</option><option>Sede B</option><option>Sede C</option><option>Sede D</option></select>
            <input type="text" id="n_ext" placeholder="Extensión">
            <input type="date" id="n_fecha">
        </div>
        <div style="margin-top:20px; text-align:right;">
            <button class="btn btn-blue" id="btnGuardarEquipo" onclick="ejecutarGuardado()"><i class="fas fa-save"></i> Guardar</button>
            <button class="btn btn-gray" onclick="cerrarModales()">Cancelar</button>
        </div>
    </div>
</div>

<div id="modalMante" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <span class="close-modal" onclick="cerrarModales()">&times;</span>
        <h2 id="manteTitle">Registrar Mantenimiento</h2>
        <input type="date" id="m_fecha" style="margin-bottom:10px;">
        <select id="m_tipo" style="margin-bottom:10px;">
            <option value="">Seleccione el tipo</option>
            <option>Preventivo</option>
            <option>Correctivo</option>
        </select>
        <textarea id="m_desc" placeholder="Descripción del Mantenimiento" rows="6"></textarea>
        <div style="margin-top:20px; text-align:right;">
            <button class="btn btn-blue" onclick="guardarMantenimiento()">Registrar Mantenimiento</button>
        </div>
    </div>
</div>

<div id="modalDetalles" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModales()">&times;</span>
        <h2 id="detallesTitle">Detalles de Mantenimientos</h2>
        <table style="width:100%">
            <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th></tr></thead>
            <tbody id="tablaMantes"></tbody>
        </table>
        <div style="text-align:right; margin-top:20px;"><button class="btn btn-gray" onclick="cerrarModales()">Cerrar</button></div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let currentColl = "";
    let localData = [];
    let selectedId = ""; // ID para editar o mantenimiento
    let modoModal = "registro"; // registro, editar, copia

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u){ document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block'; } });

    function abrir(id) {
        document.getElementById('panel-principal').style.display='none';
        document.getElementById('modulo_inv').style.display='block';
        currentColl = (id === 'inv_admin') ? "inventario" : "inventario_salas";
        document.getElementById('titulo_inv').innerText = (id === 'inv_admin') ? "Inventario de equipos TIC" : "Inventario de equipos TIC (Salas)";
        cargarInventario();
    }

    function volver() { document.getElementById('panel-principal').style.display='grid'; document.getElementById('modulo_inv').style.display='none'; }
    function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    // --- ACCIONES DE EQUIPO ---

    function abrirModalRegistro() {
        modoModal = "registro";
        document.getElementById('modalTitle').innerText = "Registrar nuevo equipo";
        document.querySelectorAll('#formEquipo input, #formEquipo select').forEach(i => i.value = "");
        document.getElementById('modalEquipo').style.display = 'block';
    }

    function abrirEditar(id) {
        modoModal = "editar";
        selectedId = id;
        const data = localData.find(e => e.id === id);
        document.getElementById('modalTitle').innerText = "Editar equipo";
        rellenarForm(data);
        document.getElementById('modalEquipo').style.display = 'block';
    }

    function abrirCopiar(id) {
        modoModal = "copia";
        const data = localData.find(e => e.id === id);
        document.getElementById('modalTitle').innerText = "Registrar equipo (copia)";
        rellenarForm(data);
        document.getElementById('modalEquipo').style.display = 'block';
    }

    function rellenarForm(d) {
        n_pc.value = d.pc; n_tipo.value = d.tipo; n_mod.value = d.modelo; n_inv.value = d.inv;
        n_so.value = d.so; n_proc.value = d.proc; n_ram.value = d.ram; n_disco.value = d.disco;
        n_ip.value = d.ip; n_term.value = d.term; n_res.value = d.res; n_dep.value = d.dep;
        n_correo.value = d.correo; n_cam.value = d.cam; n_sed.value = d.sed; n_ext.value = d.ext; n_fecha.value = d.fecha;
    }

    async function ejecutarGuardado() {
        const obj = {
            pc: n_pc.value, tipo: n_tipo.value, modelo: n_mod.value, inv: n_inv.value,
            so: n_so.value, proc: n_proc.value, ram: n_ram.value, disco: n_disco.value,
            ip: n_ip.value, term: n_term.value, res: n_res.value, dep: n_dep.value,
            correo: n_correo.value, cam: n_cam.value, sed: n_sed.value, ext: n_ext.value, fecha: n_fecha.value
        };

        if(modoModal === "editar") {
            await db.collection(currentColl).doc(selectedId).update(obj);
        } else {
            await db.collection(currentColl).add(obj);
        }
        cerrarModales();
        alert("Operación exitosa");
    }

    // --- MANTENIMIENTO ---

    function abrirMantenimiento(id) {
        selectedId = id;
        const data = localData.find(e => e.id === id);
        document.getElementById('manteTitle').innerText = `Registrar Mantenimiento para Equipo: ${data.inv}`;
        document.getElementById('m_fecha').value = new Date().toISOString().split('T')[0];
        document.getElementById('modalMante').style.display = 'block';
    }

    async function guardarMantenimiento() {
        await db.collection(currentColl).doc(selectedId).collection("mantenimientos").add({
            fecha: m_fecha.value, tipo: m_tipo.value, desc: m_desc.value
        });
        cerrarModales();
        alert("Mantenimiento registrado");
    }

    function abrirDetalles(id) {
        const data = localData.find(e => e.id === id);
        document.getElementById('detallesTitle').innerText = `Detalles de Mantenimientos para ${data.inv} (${data.pc})`;
        db.collection(currentColl).doc(id).collection("mantenimientos").orderBy("fecha", "desc").get().then(snap => {
            const tbody = document.getElementById('tablaMantes');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                tbody.innerHTML += `<tr><td>${m.fecha}</td><td>${m.tipo}</td><td>${m.desc}</td></tr>`;
            });
            document.getElementById('modalDetalles').style.display = 'block';
        });
    }

    // --- CARGA Y FILTROS ---

    function cargarInventario() {
        db.collection(currentColl).onSnapshot(snap => {
            localData = [];
            snap.forEach(doc => localData.push({id: doc.id, ...doc.data()}));
            filtrar();
        });
    }

    function filtrar() {
        const fpc = f_pc.value.toLowerCase();
        const finv = f_inv.value.toLowerCase();
        const fres = f_res.value.toLowerCase();
        
        const res = localData.filter(e => 
            (e.pc||"").toLowerCase().includes(fpc) && 
            (e.inv||"").toLowerCase().includes(finv) && 
            (e.res||"").toLowerCase().includes(fres)
        );
        
        document.getElementById('resumen_conteo').innerText = `Equipos encontrados: ${res.length}`;
        const tbody = document.getElementById('tablaData');
        tbody.innerHTML = "";
        res.forEach(e => {
            tbody.innerHTML += `<tr>
                <td><b>${e.pc}</b></td><td>${e.tipo}</td><td>${e.modelo}</td><td>${e.inv}</td><td>${e.res}</td><td>${e.dep}</td>
                <td>
                    <button class="btn-acc bg-edit" onclick="abrirEditar('${e.id}')" title="Editar"><i class="fas fa-edit"></i></button>
                    <button class="btn-acc bg-tools" onclick="abrirMantenimiento('${e.id}')" title="Mantenimiento"><i class="fas fa-tools"></i></button>
                    <button class="btn-acc bg-copy" onclick="abrirCopiar('${e.id}')" title="Copiar"><i class="fas fa-copy"></i></button>
                    <button class="btn-acc bg-view" onclick="abrirDetalles('${e.id}')" title="Ver Mantenimientos"><i class="fas fa-eye"></i></button>
                    <button class="btn-acc bg-delete" onclick="eliminar('${e.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    async function eliminar(id) { if(confirm("¿Eliminar equipo?")) await db.collection(currentColl).doc(id).delete(); }
</script>
</body>
</html>
