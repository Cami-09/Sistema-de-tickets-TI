<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema TI - Inventario Profesional</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }

        header { background: var(--dark); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }

        #dashboard { padding: 2rem; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .card i { font-size: 2.5rem; color: var(--primary); }

        .modulo { display: none; background: white; padding: 2rem; border-radius: 12px; }

        /* ESTILOS DE FILTROS (COMO EN LA IMAGEN) */
        .filtros-container { background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-filtros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .resumen-filtros { background: #dcfce7; padding: 15px; border-radius: 8px; color: #166534; margin-bottom: 15px; font-weight: bold; }

        input, select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; width: 100%; box-sizing: border-box; }

        /* TABLA */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }

        /* MODAL (REGISTRAR NUEVO) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 70%; border-radius: 15px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 25px; cursor: pointer; }

        /* BOTONES */
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-gray { background: #64748b; color: white; }
        .btn-action { padding: 5px 8px; border-radius: 4px; font-size: 12px; color: white; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white;">Salir</button>
</header>

<div id="login" style="display: flex; height: 80vh; justify-content: center; align-items: center;">
    <button class="btn btn-blue" onclick="login()">Ingresar con Google</button>
</div>

<div id="dashboard" style="display:none;">
    <div id="panel" class="grid-cards">
        <div class="card" onclick="abrir('inventario')">
            <i class="fas fa-desktop"></i>
            <h3>Inventario de equipos TIC</h3>
        </div>
        </div>

    <div id="inventario" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <button onclick="volver()" class="btn btn-gray"><i class="fas fa-chevron-left"></i> Volver</button>
            <h2 style="color:var(--primary);">Inventario de equipos TIC</h2>
            <button class="btn btn-blue" onclick="abrirModal()">+ Registrar nuevo equipo</button>
        </div>

        <div id="info-conteo" class="resumen-filtros">Equipos encontrados: <span id="totalEquipos">0</span></div>

        <div class="filtros-container">
            <div class="grid-filtros">
                <select id="f_tipo" onchange="aplicarFiltros()"><option value="">-- Tipo --</option><option>AIO</option><option>Portátil</option><option>Torre</option></select>
                <input type="text" id="f_modelo" placeholder="Modelo" onkeyup="aplicarFiltros()">
                <input type="text" id="f_inventario" placeholder="Inventario" onkeyup="aplicarFiltros()">
                <input type="text" id="f_responsable" placeholder="Responsable" onkeyup="aplicarFiltros()">
                
                <select id="f_dependencia" onchange="aplicarFiltros()"><option value="">-- Dependencia --</option><option>Sistemas</option><option>Tesorería</option></select>
                <input type="text" id="f_campus" placeholder="Campus" onkeyup="aplicarFiltros()">
                <select id="f_sede" onchange="aplicarFiltros()"><option value="">-- Sede --</option><option>Sede A</option><option>Sede D</option></select>
                <select id="f_so" onchange="aplicarFiltros()"><option value="">-- SO --</option><option>Windows 10</option><option>Windows 11</option></select>
                
                <input type="text" id="f_procesador" placeholder="Procesador" onkeyup="aplicarFiltros()">
                <input type="text" id="f_ram" placeholder="RAM" onkeyup="aplicarFiltros()">
                <input type="text" id="f_disco" placeholder="Disco" onkeyup="aplicarFiltros()">
                <input type="text" id="f_ip" placeholder="IP" onkeyup="aplicarFiltros()">
            </div>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button class="btn btn-blue" onclick="aplicarFiltros()"><i class="fas fa-filter"></i> Aplicar Filtros</button>
                <button class="btn btn-gray" onclick="limpiarFiltros()"><i class="fas fa-eraser"></i> Limpiar Filtros</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>PC</th><th>Tipo</th><th>Modelo</th><th>Inventario</th><th>Responsable</th><th>Dependencia</th><th>Campus</th><th>Sede</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaInventario"></tbody>
        </table>
    </div>
</div>

<div id="modalNuevo" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <h2 style="margin-top:0;">Registrar nuevo equipo</h2>
        <hr>
        <div class="grid-filtros" style="grid-template-columns: repeat(3, 1fr); margin-top:20px;">
            <input type="text" id="n_pc" placeholder="Nombre PC">
            <select id="n_tipo"><option value="">Seleccione Tipo</option><option>AIO</option><option>Portátil</option><option>Torre</option></select>
            <input type="text" id="n_modelo" placeholder="Modelo">
            
            <input type="text" id="n_inventario" placeholder="Inventario">
            <select id="n_so"><option value="">Seleccione SO</option><option>Windows 10</option><option>Windows 11</option></select>
            <input type="text" id="n_procesador" placeholder="Procesador">
            
            <select id="n_ram"><option value="">Seleccione RAM</option><option>4GB</option><option>8GB</option><option>16GB</option></select>
            <input type="text" id="n_disco" placeholder="Disco">
            <input type="text" id="n_ip" placeholder="IP">
            
            <input type="text" id="n_terminal" placeholder="Terminal">
            <input type="text" id="n_responsable" placeholder="Responsable">
            <select id="n_dep"><option value="">Seleccione Dependencia</option><option>Sistemas</option><option>Tesorería</option></select>
            
            <input type="text" id="n_correo" placeholder="Correo">
            <select id="n_campus"><option value="">Seleccione Campus</option><option>Bucaramanga</option></select>
            <select id="n_sede"><option value="">Seleccione Sede</option><option>Sede A</option><option>Sede D</option></select>
            
            <input type="text" id="n_ext" placeholder="Extensión">
            <input type="date" id="n_fecha">
        </div>
        <div style="text-align:right; margin-top:20px;">
            <button class="btn btn-blue" onclick="guardarEquipo()"><i class="fas fa-save"></i> Guardar</button>
            <button class="btn btn-gray" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
        authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
        projectId: "sistema-de-tickets-ti-b12f5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let todosLosEquipos = [];

    // LOGIN / LOGOUT
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(user => {
        if(user) { 
            document.getElementById('login').style.display='none'; 
            document.getElementById('dashboard').style.display='block'; 
        }
    });

    // NAVEGACIÓN
    function abrir(id) {
        document.getElementById('panel').style.display='none';
        document.getElementById(id).style.display='block';
        if(id === 'inventario') cargarInventario();
    }
    function volver() {
        document.getElementById('panel').style.display='grid';
        document.querySelectorAll('.modulo').forEach(m => m.style.display='none');
    }

    // MODAL
    function abrirModal() { document.getElementById('modalNuevo').style.display='block'; }
    function cerrarModal() { document.getElementById('modalNuevo').style.display='none'; }

    // CRUD INVENTARIO
    async function guardarEquipo() {
        const data = {
            pc: document.getElementById('n_pc').value,
            tipo: document.getElementById('n_tipo').value,
            modelo: document.getElementById('n_modelo').value,
            inventario: document.getElementById('n_inventario').value,
            so: document.getElementById('n_so').value,
            procesador: document.getElementById('n_procesador').value,
            ram: document.getElementById('n_ram').value,
            disco: document.getElementById('n_disco').value,
            ip: document.getElementById('n_ip').value,
            responsable: document.getElementById('n_responsable').value,
            dependencia: document.getElementById('n_dep').value,
            campus: document.getElementById('n_campus').value,
            sede: document.getElementById('n_sede').value
        };
        await db.collection("inventario").add(data);
        alert("Equipo Registrado");
        cerrarModal();
    }

    function cargarInventario() {
        db.collection("inventario").onSnapshot(snap => {
            todosLosEquipos = [];
            snap.forEach(doc => todosLosEquipos.push({id: doc.id, ...doc.data()}));
            aplicarFiltros();
        });
    }

    // LÓGICA DE FILTRADO (FILTRAR EN TIEMPO REAL)
    function aplicarFiltros() {
        const f_tipo = document.getElementById('f_tipo').value.toLowerCase();
        const f_mod = document.getElementById('f_modelo').value.toLowerCase();
        const f_inv = document.getElementById('f_inventario').value.toLowerCase();
        const f_res = document.getElementById('f_responsable').value.toLowerCase();

        const filtrados = todosLosEquipos.filter(e => {
            return (e.tipo.toLowerCase().includes(f_tipo)) &&
                   (e.modelo.toLowerCase().includes(f_mod)) &&
                   (e.inventario.toLowerCase().includes(f_inv)) &&
                   (e.responsable.toLowerCase().includes(f_res));
        });

        renderizarTabla(filtrados);
    }

    function renderizarTabla(lista) {
        const tbody = document.getElementById('tablaInventario');
        document.getElementById('totalEquipos').innerText = lista.length;
        tbody.innerHTML = "";
        lista.forEach(e => {
            tbody.innerHTML += `
                <tr>
                    <td>${e.pc}</td>
                    <td>${e.tipo}</td>
                    <td>${e.modelo}</td>
                    <td>${e.inventario}</td>
                    <td>${e.responsable}</td>
                    <td>${e.dependencia}</td>
                    <td>${e.campus}</td>
                    <td>${e.sede}</td>
                    <td>
                        <button class="btn-action" style="background:#fbbf24" onclick="editar('${e.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-action" style="background:var(--danger)" onclick="eliminar('${e.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
    }

    function limpiarFiltros() {
        document.querySelectorAll('.grid-filtros input, .grid-filtros select').forEach(i => i.value = "");
        aplicarFiltros();
    }

    async function eliminar(id) {
        if(confirm("¿Eliminar equipo?")) await db.collection("inventario").doc(id).delete();
    }
</script>
</body>
</html>
