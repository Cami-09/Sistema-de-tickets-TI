<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tickets PRO - Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
<style>
body { font-family: Arial; background:#f5f7fa; margin:0; padding:0; }
header { background:#4285F4; color:white; padding:15px; font-size:24px; text-align:center; position:relative; }
#logoutBtn { position:absolute; top:15px; right:15px; background:#F44336; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
#loginDiv { padding:50px; text-align:center; }
#loginDiv button { padding:12px 25px; background:#4285F4; color:white; border:none; border-radius:6px; font-size:18px; cursor:pointer; }
#panelControl { display:flex; flex-wrap:wrap; justify-content:center; padding:20px; }
.modulo-btn { width:180px; height:180px; background:white; margin:15px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.1); transition:0.3s; text-align:center; }
.modulo-btn:hover { box-shadow:0 5px 15px rgba(0,0,0,0.2); transform:translateY(-5px); }
.modulo-btn i { font-size:36px; margin-bottom:10px; color:#4285F4; }
.modulo { display:none; padding:20px; }
.card { background:white; border-radius:12px; padding:15px; margin:15px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
input, select { padding:8px; margin:5px 0; width:100%; box-sizing:border-box; }
button { cursor:pointer; margin:5px 0; padding:8px 12px; border:none; border-radius:6px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
table, th, td { border:1px solid #ccc; border-radius:6px; }
th { background:#4285F4; color:white; }
td button { padding:4px 8px; margin:2px; font-size:12px; }
</style>
</head>
<body>

<header>🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div id="loginDiv">
  <button id="loginBtn">Iniciar sesión con Google</button>
</div>

<div id="dashboard" style="display:none;">

  <div id="panelControl">
    <div class="modulo-btn" onclick="mostrarModulo('consultarTickets')"><i class="fas fa-search"></i><h4>Consultar Tickets</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('enviarTickets')"><i class="fas fa-paper-plane"></i><h4>Enviar Tickets</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('administrarTickets')"><i class="fas fa-tasks"></i><h4>Administrar Tickets</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('equiposAdministrativos')"><i class="fas fa-desktop"></i><h4>Equipos Administrativos</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('equiposSalas')"><i class="fas fa-laptop"></i><h4>Equipos de Salas</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('calendario')"><i class="fas fa-calendar-alt"></i><h4>Calendario</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('aulasDTI')"><i class="fas fa-chalkboard"></i><h4>Aulas DTI</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('salasSistemas')"><i class="fas fa-server"></i><h4>Salas de Sistemas</h4></div>
    <div class="modulo-btn" onclick="mostrarModulo('impresoras')"><i class="fas fa-print"></i><h4>Impresoras</h4></div>
  </div>

  <!-- Módulos -->
  <div id="consultarTickets" class="modulo"><div id="listaTickets"></div></div>
  <div id="enviarTickets" class="modulo">
    <div class="card">
      <h3>Enviar Ticket</h3>
      <input id="titulo" placeholder="Título">
      <input id="desc" placeholder="Descripción">
      <select id="prioridad"><option>baja</option><option>media</option><option>alta</option></select>
      <input type="file" id="file">
      <button onclick="crearTicket()">Enviar Ticket</button>
    </div>
  </div>
  <div id="administrarTickets" class="modulo"><div id="adminTickets"></div></div>
  <div id="equiposAdministrativos" class="modulo"><p>Equipos Administrativos</p></div>
  <div id="equiposSalas" class="modulo"><p>Equipos de Salas</p></div>
  <div id="calendario" class="modulo"><p>Calendario</p></div>
  <div id="aulasDTI" class="modulo"><p>Aulas DTI</p></div>
  <div id="salasSistemas" class="modulo"><p>Salas de Sistemas</p></div>
  <div id="impresoras" class="modulo"><p>Impresoras</p></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
  authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
  projectId: "sistema-de-tickets-ti-b12f5",
  storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
  messagingSenderId: "356054718850",
  appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();
let currentUser, currentRole;

// ================= LOGIN =================
document.getElementById("loginBtn").addEventListener("click",()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
});

auth.onAuthStateChanged(async user=>{
  if(!user) return;
  currentUser=user;
  document.getElementById("loginDiv").style.display="none";
  document.getElementById("dashboard").style.display="block";

  const roleRef = db.collection("roles").doc(user.email);
  let doc = await roleRef.get();

  if(user.email==="camicarmona1212@gmail.com"){
    await roleRef.set({rol:"admin"});
    doc = await roleRef.get();
  }

  if(!doc.exists){
    await roleRef.set({rol:"usuario"});
    doc = await roleRef.get();
  }

  currentRole = doc.data().rol;

  cargarTickets();
});

// ================= MÓDULOS =================
function mostrarModulo(id){
  document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
  document.getElementById(id).style.display="block";
}

// ================= TICKETS =================
async function crearTicket(){
  let url="";
  const f=file.files[0];
  if(f){const ref=storage.ref("tickets/"+Date.now()); await ref.put(f); url=await ref.getDownloadURL();}
  await db.collection("tickets").add({
    titulo:titulo.value,
    descripcion:desc.value,
    estado:"abierto",
    prioridad:prioridad.value,
    usuario:currentUser.email,
    tecnico:"",
    historial:[]
  });
  alert("Ticket creado");
  titulo.value=""; desc.value=""; prioridad.value="baja"; file.value="";
  cargarTickets();
}

async function cargarTickets(){
  let query=db.collection("tickets");
  if(currentRole==="usuario") query=query.where("usuario","==",currentUser.email);
  if(currentRole==="gestor") query=query.where("tecnico","==",currentUser.email);
  const snapshot = await query.get();
  const listaTickets = document.getElementById("listaTickets");
  listaTickets.innerHTML="";
  snapshot.forEach(doc=>{
    const t=doc.data();
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <b>${t.titulo}</b><br>
      ${t.descripcion}<br>
      Estado: <b>${t.estado}</b><br>
      Prioridad: <b>${t.prioridad}</b><br>
      Usuario: ${t.usuario}<br>
      Gestor: ${t.tecnico || "Sin asignar"}
    `;
    listaTickets.prepend(div);
  });
}

// ================= SESIÓN =================
function cerrarSesion(){
  auth.signOut().then(()=>{
    currentUser=null;
    currentRole=null;
    document.getElementById("dashboard").style.display="none";
    document.getElementById("loginDiv").style.display="block";
  });
}
</script>

</body>
</html>
