<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TIC UNICIENCIA - MASTER FINAL INTEGRAL</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #00bcd4; --purple: #8b5cf6; --gray: #64748b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; overflow-x: hidden; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 1000; }
        #login { display: none; height: 80vh; justify-content: center; align-items: center; }
        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.08); border-color: var(--primary); }
        .card i { font-size: 40px; color: var(--primary); margin-bottom: 15px; }
        .card h3 { margin: 0; font-size: 1.1rem; color: var(--dark); }
        .modulo { display: none; background: white; padding: 30px; border-radius: 20px; min-height: 550px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-agregar-master { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); text-transform: uppercase; font-size: 0.85rem; }
        .btn-acc { width: 38px; height: 38px; border-radius: 10px; border: none; color: white; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; font-size: 1rem; margin-right: 5px; }
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 2% auto; padding: 40px; width: 90%; max-width: 850px; border-radius: 25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        .grid-bonito { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 35px; margin-top: 20px; }
        .campo-group { display: flex; flex-direction: column; gap: 8px; }
        .campo-group label { font-weight: 700; font-size: 0.8rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
        .campo-group input, .campo-group select, .campo-group textarea { padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; }
        .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { padding: 20px; border-radius: 15px; color: white; text-align: center; font-weight: bold; }
        .stat-card span { font-size: 2.5rem; display: block; margin-top: 5px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 15px; text-align: left; color: var(--gray); font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; background: white; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .btn-blue { background: var(--primary); color: white; border-radius: 10px; padding: 12px 25px; cursor: pointer; border: none; font-weight: 600; }
        .btn-gray { background: #e2e8f0; color: #475569; border-radius: 10px; padding: 12px 25px; cursor: pointer; border: none; font-weight: 600; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <div style="display:flex; align-items:center; gap:15px;">
        <span id="user_info"></span>
        <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:6px 15px; border-radius:8px; cursor:pointer;">Salir</button>
    </div>
</header>

<div id="login">
    <div style="text-align:center; background:white; padding:50px; border-radius:30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        <i class="fas fa-shield-alt fa-4x" style="color:var(--primary); margin-bottom:20px;"></i>
        <h1>Portal TI Uniciencia</h1>
        <button class="btn-agregar-master" onclick="login()"><i class="fab fa-google"></i> Ingresar con Google</button>
    </div>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" id="card_mis_tickets" onclick="abrir('mod_mis_tickets')"><i class="fas fa-ticket-alt"></i><h3>Mis Tickets</h3></div>
        <div class="card" id="card_enviar_ticket" onclick="abrir('mod_enviar_ticket')"><i class="fas fa-paper-plane"></i><h3>Enviar Ticket</h3></div>
        <div class="card" id="card_admin_tickets" onclick="abrir('mod_admin_tickets')"><i class="fas fa-tasks"></i><h3>Admin Tickets</h3></div>
        <div class="card" id="card_inv_admin" onclick="abrir_maestro('inventario', 'Equipos Administrativos')"><i class="fas fa-laptop-medical"></i><h3>Inventario Admin</h3></div>
        <div class="card" id="card_inv_salas" onclick="abrir_maestro('inventario_salas', 'Equipos de Salas')"><i class="fas fa-desktop"></i><h3>Inventario Salas</h3></div>
        <div class="card" id="card_calendario" onclick="abrir('mod_calendario')"><i class="fas fa-calendar-check"></i><h3>Calendario</h3></div>
        <div class="card" id="card_aulas" onclick="abrir_maestro('aulas_dti', 'Aulas DTI')"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
        <div class="card" id="card_salas" onclick="abrir_maestro('salas_sistemas', 'Salas Sistemas')"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
        <div class="card" id="card_impresoras" onclick="abrir_maestro('impresoras', 'Impresoras')"><i class="fas fa-print"></i><h3>Impresoras</h3></div>
        <div class="card" id="card_usuarios" onclick="abrir_maestro('usuarios', 'Usuarios')"><i class="fas fa-users-cog"></i><h3>Usuarios</h3></div>
    </div>

    <div id="mod_maestro" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <button onclick="volver()" class="btn-gray">Volver</button>
            <h2 id="m_titulo"></h2>
            <button class="btn-agregar-master" onclick="abrirModalRegistro('nuevo')">Agregar Registro</button>
        </div>
        <div style="overflow-x:auto;">
            <table><thead id="m_thead"></thead><tbody id="m_tbody"></tbody></table>
        </div>
    </div>

    <div id="mod_admin_tickets" class="modulo">
        <button onclick="volver()" class="btn-gray">Volver</button>
        <div class="grid-stats" style="margin-top:20px;">
            <div class="stat-card" style="background:var(--success);">ABIERTOS <span id="s_open">0</span></div>
            <div class="stat-card" style="background:var(--warning);">EN PROCESO <span id="s_proc">0</span></div>
            <div class="stat-card" style="background:var(--danger);">CERRADOS <span id="s_close">0</span></div>
        </div>
        <table><thead><tr><th>ID</th><th>Tipo</th><th>Estado</th><th>Gestor</th><th>Acciones</th></tr></thead><tbody id="tbody_admin_tickets"></tbody></table>
    </div>

    <div id="mod_enviar_ticket" class="modulo">
        <button onclick="volver()" class="btn-gray">Volver</button>
        <div class="grid-bonito">
            <div class="campo-group"><label>Dependencia</label><select id="tk_dep"><option>Sistemas</option></select></div>
            <div class="campo-group"><label>Tipo</label><select id="tk_tipo"><option>Soporte Técnico</option></select></div>
            <div class="campo-group" style="grid-column: span 2;"><label>Descripción</label><textarea id="tk_desc" rows="4"></textarea></div>
        </div>
        <button class="btn-blue" onclick="enviarTicket()" style="margin-top:20px;">Enviar</button>
    </div>

    <div id="mod_mis_tickets" class="modulo"><button onclick="volver()" class="btn-gray">Volver</button><div id="mis_tk_container"></div></div>
    <div id="mod_calendario" class="modulo"><button onclick="volver()" class="btn-gray">Volver</button><div id="calendar"></div></div>
</div>

<div id="modalVerTicket" class="modal">
    <div class="modal-content">
        <h2>Detalles</h2>
        <div id="detalle_ticket_content" class="grid-bonito"></div>
        <button class="btn-blue" onclick="cerrarModales()" style="margin-top:20px;">Cerrar Ventana</button>
    </div>
</div>

<div id="modalRegistro" class="modal">
    <div class="modal-content">
        <h2 id="modal_tit">Formulario</h2>
        <div class="grid-bonito" id="form_dinamico"></div>
        <div style="margin-top:20px; text-align:right;">
            <button class="btn-gray" onclick="cerrarModales()">Cancelar</button>
            <button class="btn-blue" onclick="guardarDatoMaestro()">Guardar Cambios</button>
        </div>
    </div>
</div>

<div id="modalReasignar" class="modal"><div class="modal-content"><h2>Reasignar</h2><select id="re_gestor_new" style="width:100%; padding:10px;"></select><button class="btn-blue" onclick="ejecutarReasignar()" style="margin-top:20px; width:100%;">Confirmar</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let user, userRole, currentColl, localData = [], selectedId, modoModal = "nuevo", unsubMaestro = null, listaGestoresGlobal = [];

    auth.onAuthStateChanged(async (u) => { 
        if(u){ 
            user = u; document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block';
            await verificarRol(); cargarGestores(); restaurarSesion();
        } else { document.getElementById('login').style.display='flex'; document.getElementById('dashboard').style.display='none'; }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { localStorage.clear(); auth.signOut().then(() => location.reload()); }

    async function cargarGestores() {
        const q = await db.collection("usuarios").where("rol", "==", "Gestor").get();
        listaGestoresGlobal = []; q.forEach(doc => listaGestoresGlobal.push(doc.data()));
    }

    async function verificarRol() {
        if(user.email === "camicarmona1212@gmail.com") userRole = "Admin";
        else {
            const q = await db.collection("usuarios").where("cor", "==", user.email).get();
            userRole = !q.empty ? q.docs[0].data().rol : "Usuario";
        }
        document.getElementById('user_info').innerText = user.email;
        const c = ["card_mis_tickets", "card_enviar_ticket", "card_admin_tickets", "card_inv_admin", "card_inv_salas", "card_calendario", "card_aulas", "card_salas", "card_impresoras", "card_usuarios"];
        const v = { "Admin": c, "Gestor": c.filter(x => x !== "card_usuarios"), "Usuario": ["card_mis_tickets", "card_enviar_ticket"] };
        document.querySelectorAll('.card').forEach(el => el.style.display = 'none');
        (v[userRole] || v["Usuario"]).forEach(id => document.getElementById(id).style.display = 'block');
    }

    function abrir(id, mColl = null, mTit = null) {
        localStorage.setItem("ultimoModulo", id);
        if(unsubMaestro) unsubMaestro();
        if(mColl) {
            localStorage.setItem("mColl", mColl); localStorage.setItem("mTit", mTit);
            currentColl = mColl; document.getElementById('m_titulo').innerText = mTit;
            unsubMaestro = db.collection(currentColl).onSnapshot(s => { localData = []; s.forEach(d => localData.push({id: d.id, ...d.data()})); renderTabla(); });
        }
        document.getElementById('panel-principal').style.display='none';
        document.querySelectorAll('.modulo').forEach(m => m.style.display='none');
        document.getElementById(id).style.display='block';
        if(id === 'mod_admin_tickets') cargarTicketsAdmin();
    }

    function volver() { localStorage.removeItem("ultimoModulo"); document.getElementById('panel-principal').style.display='grid'; document.querySelectorAll('.modulo').forEach(m => m.style.display='none'); }
    function restaurarSesion() { const m = localStorage.getItem("ultimoModulo"); if(m) abrir(m, localStorage.getItem("mColl"), localStorage.getItem("mTit")); }
    function abrir_maestro(c, t) { abrir('mod_maestro', c, t); }

    function renderTabla() {
        const b = document.getElementById('m_tbody'); b.innerHTML = "";
        const esU = currentColl === 'usuarios';
        document.getElementById('m_thead').innerHTML = esU ? `<tr><th>Nombre</th><th>Correo</th><th>Acciones</th></tr>` : `<tr><th>Equipo</th><th>Sede</th><th>Acciones</th></tr>`;
        localData.forEach(e => {
            b.innerHTML += `<tr><td><b>${e.nom||e.pc}</b></td><td>${esU?e.cor:e.sed}</td><td>
                <button class="btn-acc bg-v-gray" onclick="verDetalleMaestro('${e.id}')"><i class="fas fa-eye"></i></button>
                <button class="btn-acc bg-info-e" onclick="abrirModalRegistro('editar','${e.id}')"><i class="fas fa-edit"></i></button>
                ${userRole === 'Admin' ? `<button class="btn-acc bg-d-red" onclick="eliminar('${e.id}','${currentColl}')"><i class="fas fa-trash"></i></button>` : ''}
            </td></tr>`;
        });
    }

    function abrirModalRegistro(modo, id = null) {
        modoModal = modo; selectedId = id;
        const f = document.getElementById('form_dinamico'); f.innerHTML = "";
        let c = currentColl === 'usuarios' ? [["Nombre","nom"],["Correo","cor"],["Rol","rol","select",["Admin","Gestor","Usuario"]]] : [["Sede","sed"],["Nombre","nom"],["Ubicación","ubi"],["Serial","ser"],["Marca","mar"]];
        
        c.forEach(x => {
            let inp = x[2]==="select" ? `<select id="${x[1]}">${x[3].map(o=>`<option value="${o}">${o}</option>`).join('')}</select>` : `<input type="text" id="${x[1]}" placeholder="${x[0]}">`;
            f.innerHTML += `<div class="campo-group"><label>${x[0]}</label>${inp}</div>`;
        });

        if(modo === 'editar') {
            const d = localData.find(x => x.id === id);
            if(d) document.querySelectorAll('#form_dinamico input, #form_dinamico select').forEach(i => i.value = d[i.id] || "");
            document.getElementById('modal_tit').innerText = "Editar Registro";
        } else {
            document.getElementById('modal_tit').innerText = "Nuevo Registro";
        }
        document.getElementById('modalRegistro').style.display='block';
    }

    async function guardarDatoMaestro() {
        let o = {}; document.querySelectorAll('#form_dinamico input, #form_dinamico select').forEach(i => o[i.id] = i.value);
        if(modoModal === 'editar') await db.collection(currentColl).doc(selectedId).update(o);
        else await db.collection(currentColl).add(o);
        cerrarModales();
    }

    function cargarTicketsAdmin() {
        db.collection("tickets").onSnapshot(snap => {
            let o=0, p=0, c=0; const tbody = document.getElementById('tbody_admin_tickets'); tbody.innerHTML = "";
            snap.forEach(doc => {
                const t = doc.data(); if(t.estado === "Abierto") o++; if(t.estado === "En Proceso") p++; if(t.estado === "Cerrado") c++;
                tbody.innerHTML += `<tr><td>#${doc.id.substring(0,5)}</td><td>${t.tipo}</td><td>${t.estado}</td><td>${t.asignado}</td><td>
                    <button class="btn-acc bg-v-gray" onclick="verDetalleTicket('${doc.id}')"><i class="fas fa-eye"></i></button>
                    <button class="btn-acc bg-p-orange" onclick="actEstado('${doc.id}','En Proceso')"><i class="fas fa-clock"></i></button>
                    ${userRole==='Admin' ? `<button class="btn-acc bg-r-purple" onclick="abrirRe('${doc.id}')"><i class="fas fa-user-edit"></i></button>` : ''}
                    <button class="btn-acc bg-c-green" onclick="actEstado('${doc.id}','Cerrado')"><i class="fas fa-check-circle"></i></button>
                    ${userRole==='Admin' ? `<button class="btn-acc bg-d-red" onclick="eliminar('${doc.id}','tickets')"><i class="fas fa-trash"></i></button>` : ''}
                </td></tr>`;
            });
            s_open.innerText=o; s_proc.innerText=p; s_close.innerText=c;
        });
    }

    function verDetalleMaestro(id) {
        const e = localData.find(x => x.id === id);
        let h = ""; for (const k in e) if(k !== 'id') h += `<div class="campo-group"><label>${k.toUpperCase()}</label><p style="padding:10px; background:#f1f5f9;">${e[k]}</p></div>`;
        document.getElementById('detalle_ticket_content').innerHTML = h;
        document.getElementById('modalVerTicket').style.display = 'block';
    }

    async function verDetalleTicket(id) {
        const doc = await db.collection("tickets").doc(id).get();
        const t = doc.data();
        document.getElementById('detalle_ticket_content').innerHTML = `<p><b>Usuario:</b> ${t.usuario}</p><p><b>Desc:</b> ${t.desc}</p>`;
        document.getElementById('modalVerTicket').style.display = 'block';
    }

    async function abrirRe(id) { selectedId = id; const s = document.getElementById('re_gestor_new'); s.innerHTML = ""; listaGestoresGlobal.forEach(g => s.innerHTML += `<option value="${g.nom}">${g.nom}</option>`); document.getElementById('modalReasignar').style.display = 'block'; }
    async function ejecutarReasignar() { await db.collection("tickets").doc(selectedId).update({ asignado: document.getElementById('re_gestor_new').value }); cerrarModales(); }
    async function actEstado(id, est) { await db.collection("tickets").doc(id).update({estado: est}); }
    function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    async function eliminar(id, coll) { if(confirm("¿Eliminar?")) await db.collection(coll).doc(id).delete(); }
    async function enviarTicket() { await db.collection("tickets").add({ usuario: user.email, tipo: tk_tipo.value, desc: tk_desc.value, estado: "Abierto", asignado: "Pendiente" }); volver(); }
</script>
</body>
</html>
