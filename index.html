<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets PRO</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; }
    header { background: #1e88a8; color: white; padding: 15px; font-size: 24px; text-align: center; position: relative; }
    #logoutBtn { position: absolute; right: 15px; top: 15px; background: red; color: white; border: none; padding: 8px; cursor: pointer; }
    
    /* INICIO DE SESIÓN */
    #loginDiv { display: flex; justify-content: center; align-items: center; height: 100vh; }
    #loginDiv button {
      background: #1e88a8;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }
    #loginDiv button:hover { background: #1565c0; }

    /* CARD STYLES */
    .cardDash {
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      width: 220px;
      margin: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .cardDash:hover { transform: translateY(-5px); box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15); }
    .icon { font-size: 40px; color: #1e88a8; margin-bottom: 10px; }

    /* DASHBOARD */
    #dashboard { display: none; padding: 20px; }
    .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
    .tabs button { padding: 12px 25px; border: none; background: none; cursor: pointer; font-size: 16px; transition: all 0.3s; }
    .tabs button.active { background: #1e88a8; color: white; border-radius: 6px; }
    .modulo { display: none; }
    .modulo .card { margin: 10px 0; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; }
    .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 10px; width: 300px; text-align: center; }
    .modal-content select, .modal-content button { width: 90%; margin: 5px 0; }
  </style>
</head>
<body>

<header>🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Salir</button>
</header>

<!-- LOGIN -->
<div id="loginDiv">
  <button id="loginBtn">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- TABS -->
  <div class="tabs">
    <button class="tabBtn active" onclick="mostrarModulo('crearTicket', this)">Crear Ticket</button>
    <button class="tabBtn" onclick="mostrarModulo('listaTickets', this)">Ver Tickets</button>
    <button class="tabBtn" onclick="mostrarModulo('adminTickets', this)">Administrar Tickets</button>
    <button class="tabBtn" id="btnUsuarios" onclick="mostrarModulo('usuariosSection', this)">Usuarios</button>
  </div>

  <!-- Módulo Crear Ticket -->
  <div id="crearTicket" class="modulo">
    <div class="card">
      <h3>Crear Ticket</h3>
      <input id="titulo" placeholder="Título">
      <input id="desc" placeholder="Descripción">
      <select id="prioridad">
        <option>baja</option>
        <option>media</option>
        <option>alta</option>
      </select><br>
      <button onclick="crearTicket()">Crear</button>
    </div>
  </div>

  <!-- Módulo Ver Tickets -->
  <div id="listaTickets" class="modulo">
    <div id="lista"></div>
  </div>

  <!-- Módulo Administrar Tickets -->
  <div id="adminTickets" class="modulo">
    <div id="adminLista"></div>
  </div>

  <!-- Módulo Usuarios -->
  <div id="usuariosSection" class="modulo">
    <input id="emailUser" placeholder="Email">
    <input id="nombreUser" placeholder="Nombre">
    <select id="rolUser">
      <option>Usuario</option>
      <option>Gestor</option>
      <option>Admin</option>
    </select>
    <button onclick="agregarUsuario()">Agregar Usuario</button>
    <h3>Lista de Usuarios</h3>
    <table id="tablaUsuarios"></table>
  </div>

</div>

<!-- Modal de Reasignación -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Reasignar Ticket</h3>
    <select id="selectGestor"></select>
    <button onclick="confirmarReasignacion()">Aceptar</button>
    <button onclick="cancelarReasignacion()">Cancelar</button>
  </div>
</div>

<script>
  // Configuración de Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
    authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
    projectId: "sistema-de-tickets-ti-b12f5",
    storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
    messagingSenderId: "356054718850",
    appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  let currentUser, currentRole;

  // Función de inicio de sesión
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const result = await auth.signInWithPopup(provider);
      const user = result.user;
      console.log("Logged in as", user.displayName);

      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      const roleRef = db.collection("roles").doc(user.email);
      let doc = await roleRef.get();
      if (!doc.exists) {
        await roleRef.set({ rol: "Usuario", nombre: user.displayName });
        doc = await roleRef.get();
      }
      currentRole = doc.data().rol;
      cargarTickets();
      cargarUsuarios();
    } catch (error) {
      console.error("Error during login:", error.message);
      alert("Hubo un error al iniciar sesión. Intenta nuevamente.");
    }
  });

  // Cambiar de módulo
  function mostrarModulo(id, btn) {
    document.querySelectorAll(".modulo").forEach(m => m.style.display = "none");
    document.getElementById(id).style.display = "block";

    document.querySelectorAll(".tabBtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  // Crear Ticket
  async function crearTicket() {
    await db.collection("tickets").add({
      titulo: document.getElementById("titulo").value,
      descripcion: document.getElementById("desc").value,
      prioridad: document.getElementById("prioridad").value,
      estado: "abierto",
      usuario: currentUser.email,
      gestor: ""
    });
    alert("Ticket creado");
    cargarTickets();
  }

  // Cargar Tickets
  async function cargarTickets() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const snap = await db.collection("tickets").get();
    snap.forEach(doc => {
      const t = doc.data();
      if ((currentRole === "Usuario" && t.usuario !== currentUser.email) || (currentRole === "Gestor" && t.gestor !== currentUser.email)) return;

      lista.innerHTML += `
        <div class="card">
          <b>${t.titulo}</b><br>
          ${t.descripcion}<br>
          Estado: ${t.estado}<br>
          Gestor: ${t.gestor || "Sin asignar"}<br>
          <button onclick="asignarTicket('${doc.id}')">Asignar</button>
          <button onclick="cambiarEstado('${doc.id}', 'proceso')">En Proceso</button>
          <button onclick="cambiarEstado('${doc.id}', 'cerrado')">Cerrar</button>
          ${currentRole === "Admin" ? `<button onclick="eliminarTicket('${doc.id}')">Eliminar</button>` : ""}
        </div>`;
    });
  }

  // Asignar Ticket
  async function asignarTicket(id) {
    await db.collection("tickets").doc(id).update({ gestor: currentUser.email });
    cargarTickets();
  }

  // Cambiar Estado de Ticket
  async function cambiarEstado(id, estado) {
    await db.collection("tickets").doc(id).update({ estado });
    cargarTickets();
  }

  // Eliminar Ticket
  async function eliminarTicket(id) {
    if (confirm("¿Estás seguro de eliminar este ticket?")) {
      await db.collection("tickets").doc(id).delete();
      cargarTickets();
    }
  }

  // Cargar Usuarios
  async function cargarUsuarios() {
    if (currentRole !== "Admin") return;
    const tablaUsuarios = document.getElementById("tablaUsuarios");
    tablaUsuarios.innerHTML = "";
    const snap = await db.collection("roles").get();
    snap.forEach(doc => {
      tablaUsuarios.innerHTML += `
        <tr>
          <td>${doc.data().nombre}</td>
          <td>${doc.id}</td>
          <td>${doc.data().rol}</td>
        </tr>`;
    });
  }

  // Agregar Usuario
  async function agregarUsuario() {
    const email = document.getElementById("emailUser").value;
    const nombre = document.getElementById("nombreUser").value;
    const rol = document.getElementById("rolUser").value;

    if (!email || !nombre) {
      alert("Por favor ingrese un nombre y un email");
      return;
    }

    await db.collection("roles").doc(email).set({ nombre, rol });
    alert("Usuario agregado");
    cargarUsuarios();
  }

  // Cerrar Sesión
  function cerrarSesion() {
    auth.signOut();
    document.getElementById("loginDiv").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  }
</script>

</body>
</html>
