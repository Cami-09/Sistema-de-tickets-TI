<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TIC UNICIENCIA - MASTER FINAL</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #00bcd4; --purple: #8b5cf6; --gray: #64748b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }

        .modulo { display: none; background: white; padding: 25px; border-radius: 12px; min-height: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Filtros Modulo Administrativo */
        .filtros-maestro { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }

        /* Tablas */
        .header-blue { background: var(--primary); color: white; padding: 12px 15px; border-radius: 8px 8px 0 0; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        /* Botones Acción (Según Imagen) */
        .btn-acc { width: 32px; height: 32px; border-radius: 6px; border: none; color: white; cursor: pointer; margin-right: 3px; display: inline-flex; align-items: center; justify-content: center; }
        .bg-gray { background: var(--gray); }
        .bg-blue { background: var(--primary); }
        .bg-purple { background: var(--purple); }
        .bg-cyan { background: var(--info); }
        .bg-red { background: var(--danger); }

        /* Modales */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 1% auto; padding: 30px; width: 90%; max-width: 1000px; border-radius: 16px; position: relative; max-height: 95vh; overflow-y: auto; }
        
        .grid-bonito { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 30px; margin-top: 15px; }
        .campo-group { display: flex; align-items: center; justify-content: space-between; }
        .campo-group label { font-weight: 600; color: #475569; font-size: 0.85rem; width: 150px; }
        .campo-group input, .campo-group select { flex: 1; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; }

        .btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray-close { background: #e2e8f0; color: #475569; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white; padding:5px 12px;">Salir</button>
</header>

<div id="login" style="display:flex; height:80vh; justify-content:center; align-items:center;">
    <button class="btn btn-blue" onclick="login()"><i class="fab fa-google"></i> Ingresar con Google</button>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" onclick="abrir('mod_admin_tickets')"><i class="fas fa-clipboard-list"></i><h3>Administrar Tickets</h3></div>
        <div class="card" onclick="abrir_maestro('inventario', 'Equipos Administrativos')"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
        <div class="card" onclick="abrir_maestro('inventario_salas', 'Equipos de Salas')"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
        <div class="card" onclick="abrir_maestro('aulas_dti', 'Aulas DTI')"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
        <div class="card" onclick="abrir_maestro('salas_sistemas', 'Salas Sistemas')"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
        <div class="card" onclick="abrir_maestro('impresoras', 'Impresoras')"><i class="fas fa-print"></i><h3>Impresoras</h3></div>
        <div class="card" onclick="abrir('mod_calendario')"><i class="fas fa-calendar-alt"></i><h3>Calendario</h3></div>
    </div>

    <div id="mod_maestro" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <button onclick="volver()" class="btn btn-gray-close">⬅ Volver</button>
            <h2 id="m_titulo" style="color:var(--dark); margin:0;"></h2>
            <button class="btn btn-blue" onclick="abrirModalRegistro()">+ Agregar Registro</button>
        </div>

        <div class="filtros-box" style="background:white; padding:15px; border-radius:10px; margin-bottom:15px; border:1px solid #e2e8f0;">
            <div class="filtros-maestro">
                <div><label>Nombre PC</label><input type="text" id="f_pc" onkeyup="renderTabla()"></div>
                <div><label>Placa Inv.</label><input type="text" id="f_placa" onkeyup="renderTabla()"></div>
                <div><label>Campus</label><select id="f_campus" onchange="renderTabla()"><option value="">Todos</option><option>Bucaramanga</option><option>Bogotá</option></select></div>
                <div><label>Sede</label><select id="f_sede" onchange="renderTabla()"><option value="">Todas</option><option>Sede A</option><option>Sede B</option><option>Sede C</option><option>Sede D</option></select></div>
            </div>
            <div style="text-align:right;"><button class="btn btn-gray-close" onclick="limpiarFiltrosMaestro()">Limpiar Filtros</button></div>
        </div>
        
        <div class="header-blue">Listado de Registros</div>
        <table id="tabla_principal">
            <thead id="m_thead"></thead>
            <tbody id="m_tbody"></tbody>
        </table>
    </div>

    <div id="mod_calendario" class="modulo"><button onclick="volver()" class="btn btn-gray-close">Volver</button><div id="calendar" style="margin-top:20px;"></div></div>
</div>

<div id="modalRegistro" class="modal">
    <div class="modal-content">
        <h2 id="modal_tit" style="border-bottom:2px solid #f1f5f9; padding-bottom:10px;">Registro de Equipo</h2>
        <div class="grid-bonito" id="form_dinamico"></div>
        <div style="margin-top:30px; text-align:right; display:flex; gap:12px; justify-content:flex-end;">
            <button class="btn btn-blue" onclick="guardarDatoMaestro()"><i class="fas fa-save"></i> Guardar Registro</button>
            <button class="btn btn-gray-close" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>
</div>

<div id="modalMante" class="modal">
    <div class="modal-content" style="max-width:500px;">
        <h2>Registrar Mantenimiento</h2>
        <div class="grid-bonito" style="grid-template-columns:1fr;">
            <div class="campo-group"><label>Fecha</label><input type="date" id="mt_fecha"></div>
            <div class="campo-group"><label>Descripción</label><textarea id="mt_desc" rows="4"></textarea></div>
        </div>
        <div style="margin-top:20px; text-align:right;">
            <button class="btn btn-blue" onclick="ejecutarGuardarMante()">Guardar</button>
            <button class="btn btn-gray-close" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let currentColl = "", localData = [], selectedId = "", modo = "nuevo";

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u){ document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block'; } });

    function abrir_maestro(coll, tit) {
        currentColl = coll;
        document.getElementById('m_titulo').innerText = tit;
        document.getElementById('panel-principal').style.display = 'none';
        document.getElementById('mod_maestro').style.display = 'block';
        db.collection(currentColl).onSnapshot(snap => {
            localData = []; snap.forEach(doc => localData.push({id: doc.id, ...doc.data()}));
            renderTabla();
        });
    }

    function renderTabla() {
        const thead = document.getElementById('m_thead');
        const tbody = document.getElementById('m_tbody');
        const fPC = document.getElementById('f_pc').value.toLowerCase();
        const fPla = document.getElementById('f_placa').value.toLowerCase();
        const fCam = document.getElementById('f_campus').value;
        const fSed = document.getElementById('f_sede').value;

        tbody.innerHTML = "";
        thead.innerHTML = `<tr><th>Nombre PC</th><th>Tipo</th><th>Placa Inv.</th><th>Responsable</th><th>Sede</th><th>Acciones</th></tr>`;
        
        localData.filter(d => 
            (d.pc || "").toLowerCase().includes(fPC) && 
            (d.placa || "").toLowerCase().includes(fPla) &&
            (fCam === "" || d.cam === fCam) &&
            (fSed === "" || d.sed === fSed)
        ).forEach(d => {
            tbody.innerHTML += `<tr>
                <td><b>${d.pc || ''}</b></td><td>${d.tipo || ''}</td><td>${d.placa || ''}</td><td>${d.res || ''}</td><td>${d.sed || ''}</td>
                <td>
                    <button class="btn-acc bg-gray" onclick="verHistorial('${d.id}')" title="Historial"><i class="fas fa-history"></i></button>
                    <button class="btn-acc bg-blue" onclick="abrirMante('${d.id}')" title="Mantenimiento"><i class="fas fa-tools"></i></button>
                    <button class="btn-acc bg-purple" onclick="copiarEquipo('${d.id}')" title="Copiar"><i class="fas fa-copy"></i></button>
                    <button class="btn-acc bg-cyan" onclick="editarEquipo('${d.id}')" title="Editar"><i class="fas fa-edit"></i></button>
                    <button class="btn-acc bg-red" onclick="eliminar('${d.id}')" title="Eliminar"><i class="fas fa-trash"></i></button>
                </td></tr>`;
        });
    }

    function abrirModalRegistro() {
        modo = "nuevo";
        const form = document.getElementById('form_dinamico');
        form.innerHTML = "";
        const campos = [
            ["Nombre PC", "i_pc"], ["Tipo Equipo", "i_tipo", "select", ["Portátil", "Torre", "AIO"]],
            ["Modelo", "i_mod"], ["Placa Inv.", "i_placa"],
            ["S. Operativo", "i_so", "select", ["Windows 10", "Windows 11"]], ["Procesador", "i_proc"],
            ["RAM", "i_ram", "select", ["8 GB", "16 GB", "32 GB"]], ["Disco Duro", "i_disco"],
            ["Dirección IP", "i_ip"], ["Terminal", "i_term"],
            ["Responsable", "i_res"], ["Dependencia", "i_dep", "select", ["Sistemas", "Tesorería", "Rectoría"]],
            ["Correo", "i_correo"], ["Campus", "i_cam", "select", ["Bucaramanga", "Bogotá"]],
            ["Sede", "i_sed", "select", ["Sede A", "Sede B", "Sede C", "Sede D"]], ["Extensión", "i_ext"],
            ["Fecha Reg.", "i_fec", "date"], ["Observaciones", "i_obs"]
        ];
        campos.forEach(c => {
            let input = `<input type="${c[2] || 'text'}" id="${c[1]}">`;
            if(c[2] === "select") input = `<select id="${c[1]}">${c[3].map(o => `<option>${o}</option>`).join('')}</select>`;
            form.innerHTML += `<div class="campo-group"><label>${c[0]}</label>${input}</div>`;
        });
        document.getElementById('modalRegistro').style.display = 'block';
    }

    async function guardarDatoMaestro() {
        let obj = {};
        document.querySelectorAll('#form_dinamico input, #form_dinamico select').forEach(i => obj[i.id.split('_')[1]] = i.value);
        if(modo === "editar") await db.collection(currentColl).doc(selectedId).update(obj);
        else await db.collection(currentColl).add(obj);
        cerrarModales();
    }

    function editarEquipo(id) {
        abrirModalRegistro();
        modo = "editar"; selectedId = id;
        const d = localData.find(x => x.id === id);
        document.querySelectorAll('#form_dinamico input, #form_dinamico select').forEach(i => i.value = d[i.id.split('_')[1]] || "");
    }

    function copiarEquipo(id) {
        abrirModalRegistro();
        modo = "nuevo";
        const d = localData.find(x => x.id === id);
        document.querySelectorAll('#form_dinamico input, #form_dinamico select').forEach(i => i.value = d[i.id.split('_')[1]] || "");
    }

    function abrirMante(id) { selectedId = id; document.getElementById('modalMante').style.display = 'block'; }
    async function ejecutarGuardarMante() {
        const d = localData.find(x => x.id === selectedId);
        await db.collection(currentColl).doc(selectedId).collection("mantenimientos").add({
            fecha: mt_fecha.value, desc: mt_desc.value, responsable: d.res || "Sistema"
        });
        cerrarModales();
    }

    function volver() { document.getElementById('panel-principal').style.display = 'grid'; document.querySelectorAll('.modulo').forEach(m => m.style.display = 'none'); }
    function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    async function eliminar(id) { if(confirm("¿Eliminar este registro?")) await db.collection(currentColl).doc(id).delete(); }
    function limpiarFiltrosMaestro() { document.getElementById('f_pc').value = ""; document.getElementById('f_placa').value = ""; document.getElementById('f_campus').value = ""; document.getElementById('f_sede').value = ""; renderTabla(); }
</script>
</body>
</html>
