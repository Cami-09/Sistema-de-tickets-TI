<!DOCTYPE html>
<html>
<head>
  <title>Tickets PRO</title>

  <!-- Firebase v8 SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    body { font-family: Arial; background:#eef1f5; padding:20px; }
    .card { background:white; padding:15px; margin:10px 0; border-radius:12px; }
    .badge { padding:4px 8px; border-radius:6px; background:#ddd; }
    #loginBtn { padding:10px 20px; background:#4285F4; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px; }
  </style>
</head>
<body>

<h2>🎫 Tickets PRO</h2>

<!-- LOGIN -->
<div id="loginDiv">
  <button id="loginBtn">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <h3>Crear Ticket</h3>
  <div class="card">
    <input id="titulo" placeholder="Título"><br>
    <input id="desc" placeholder="Descripción"><br>

    <select id="prioridad">
      <option>baja</option>
      <option>media</option>
      <option>alta</option>
    </select><br>

    <input type="file" id="file"><br>
    <button onclick="crear()">Crear Ticket</button>
  </div>

  <h3>Lista de Tickets</h3>
  <div id="lista"></div>

  <h3>Gestión de Roles (Solo Admin)</h3>
  <div class="card">
    <input id="emailUser" placeholder="Email usuario">
    <select id="rolUser">
      <option>usuario</option>
      <option>tecnico</option>
      <option>admin</option>
    </select>
    <button onclick="guardarRol()">Guardar Rol</button>
    <div id="listaUsuarios"></div>
  </div>
</div>

<script>
  // ==================== FIREBASE CONFIG ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
    authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
    projectId: "sistema-de-tickets-ti-b12f5",
    storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
    messagingSenderId: "356054718850",
    appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  let currentUser, currentRole;

  // ==================== LOGIN GOOGLE ====================
  const loginBtn = document.getElementById("loginBtn");
  loginBtn.addEventListener("click", () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  });

  auth.onAuthStateChanged(async user => {
    if (!user) return;

    currentUser = user;
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    // ==================== ROLES ====================
    const ref = db.collection("roles").doc(user.email);
    const doc = await ref.get();
    if (!doc.exists) {
      await ref.set({ rol: "usuario" }); // usuario por defecto
    }
    currentRole = (await ref.get()).data().rol;

    cargarUsuarios();
    cargar();
  });

  // ==================== FUNCIONES TICKETS ====================
  async function crear() {
    let url = "";
    const f = file.files[0];

    if (f) {
      const ref = storage.ref("tickets/" + Date.now());
      await ref.put(f);
      url = await ref.getDownloadURL();
    }

    await db.collection("tickets").add({
      titulo: titulo.value,
      descripcion: desc.value,
      estado: "abierto",
      prioridad: prioridad.value,
      usuario: currentUser.email,
      tecnico: "",
      adjunto: url,
      fecha: new Date(),
      historial: []
    });

    autoAsignar(); // 🔥 automatización
  }

  function acciones(id) {
    let b = "";
    if (currentRole === "admin" || currentRole === "tecnico") {
      b += `<button onclick="asignar('${id}')">Asignarme</button>`;
      b += `<button onclick="estado('${id}','proceso')">Proceso</button>`;
      b += `<button onclick="estado('${id}','cerrado')">Cerrar</button>`;
    }
    return b;
  }

  function asignar(id) {
    actualizar(id, { tecnico: currentUser.email }, "Asignado");
  }

  function estado(id, e) {
    actualizar(id, { estado: e }, "Cambio estado a " + e);
  }

  async function actualizar(id, cambios, accion) {
    const docRef = db.collection("tickets").doc(id);
    const doc = await docRef.get();
    const historial = doc.data().historial || [];
    historial.push({ accion, usuario: currentUser.email, fecha: new Date() });
    await docRef.update({ ...cambios, historial });
  }

  function comentar(id) {
    const texto = document.getElementById("c-"+id).value;
    db.collection("tickets").doc(id).collection("comentarios").add({
      texto,
      usuario: currentUser.email,
      fecha: new Date()
    });
  }

  // ==================== CARGAR TICKETS ====================
  function cargar() {
    let query = db.collection("tickets");

    if (currentRole === "usuario") query = query.where("usuario", "==", currentUser.email);
    if (currentRole === "tecnico") query = query.where("tecnico", "in", ["", currentUser.email]);

    query.onSnapshot(snapshot => {
      lista.innerHTML = "";
      const tickets = snapshot.docs.map(doc => ({id: doc.id, data: doc.data()}));
      tickets.sort((a,b) => ({alta:3,media:2,baja:1}[b.data.prioridad] - {alta:3,media:2,baja:1}[a.data.prioridad]));

      tickets.forEach(t => {
        const doc = t.data;
        lista.innerHTML += `
          <div class="card">
            <b>${doc.titulo}</b>
            <span class="badge">${doc.prioridad}</span><br>
            ${doc.descripcion}<br>
            Estado: ${doc.estado}<br>
            Técnico: ${doc.tecnico || "Sin asignar"}<br>
            ${doc.adjunto ? `<a href="${doc.adjunto}" target="_blank">Ver archivo</a>` : ""}
            <br><br>
            ${acciones(t.id)}
            <input id="c-${t.id}" placeholder="Comentario">
            <button onclick="comentar('${t.id}')">Enviar</button>
          </div>
        `;
      });
    });
  }

  // ==================== ROLES ====================
  async function guardarRol() {
    const email = emailUser.value.trim();
    const rol = rolUser.value;
    if (!email) { alert("Ingresa un email"); return; }

    await db.collection("roles").doc(email).set({ rol });
    alert("Rol asignado correctamente");
    emailUser.value = "";
    cargarUsuarios();
  }

  async function cargarUsuarios() {
    if (currentRole !== "admin") return;
    const snap = await db.collection("roles").get();
    listaUsuarios.innerHTML = "<h4>Usuarios:</h4>";
    snap.forEach(doc => {
      const data = doc.data();
      listaUsuarios.innerHTML += `<div>${doc.id} → <b>${data.rol}</b></div>`;
    });
  }

  // ==================== AUTOMATIZACION ====================
  async function autoAsignar() {
    const usuariosSnap = await db.collection("roles").where("rol","==","tecnico").get();
    const tecnicos = usuariosSnap.docs.map(doc => doc.id);
    if (tecnicos.length === 0) return;

    const ticketsSnap = await db.collection("tickets")
      .where("tecnico","==","")
      .where("estado","==","abierto").get();

    ticketsSnap.forEach(async ticketDoc => {
      const randomIndex = Math.floor(Math.random() * tecnicos.length);
      const tecnico = tecnicos[randomIndex];

      const historial = ticketDoc.data().historial || [];
      historial.push({ accion:"Asignación automática", usuario:"Sistema", fecha:new Date() });

      await db.collection("tickets").doc(ticketDoc.id).update({ tecnico, historial });
    });
  }

</script>
</body>
</html>
