<!-- Contenedor principal -->
<div id="lista" style="padding: 20px; max-width: 900px; margin: auto;"></div>

<style>
  /* Tarjeta de ticket */
  .ticket-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    position: relative;
    border-left: 8px solid transparent;
  }

  /* Bordes de prioridad */
  .ticket-card.baja { border-left-color: #4caf50; }
  .ticket-card.media { border-left-color: #ff9800; }
  .ticket-card.alta { border-left-color: #f44336; }

  /* Badge prioridad */
  .priority-badge {
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 8px;
    color: white;
    text-transform: uppercase;
    font-size: 14px;
    position: absolute;
    top: 20px;
    right: 20px;
  }
  .priority-badge.baja { background: #4caf50; }
  .priority-badge.media { background: #ff9800; }
  .priority-badge.alta { background: #f44336; }

  /* Botones en línea */
  .ticket-actions button {
    margin-right: 10px;
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background-color 0.25s ease;
  }
  .ticket-actions button:hover {
    opacity: 0.9;
  }
  .btn-proceso { background: #2196f3; color: white; }
  .btn-abrir { background: #4caf50; color: white; }
  .btn-cerrar { background: #ff9800; color: white; }
  .btn-eliminar { background: #f44336; color: white; }
  .btn-reasignar { background: #607d8b; color: white; }
  .btn-asignar { background: #9c27b0; color: white; }

  /* Texto ticket */
  .ticket-title {
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 6px;
  }
  .ticket-desc {
    margin-bottom: 10px;
    font-size: 15px;
    color: #444;
  }
  .ticket-info {
    font-size: 14px;
    margin-bottom: 12px;
    color: #666;
  }
</style>

<script>
  // Ejemplo variable global con usuario y rol, reemplaza según tu autenticación
  const currentUser = { email: "aux.sistemas@unicienciabga.edu.co" }; // ejemplo email
  const currentRole = "gestor"; // admin, gestor o usuario

  // Simula acceso a Firestore
  const db = {
    collection: (name) => ({
      where: (field, op, val) => ({
        onSnapshot: (callback) => {
          // Simular datos
          const ticketsFake = [
            {
              id: "1",
              data: () => ({
                titulo: "Prueba",
                descripcion: "Esto es una prueba",
                estado: "abierto",
                prioridad: "baja",
                gestor: "aux.sistemas@unicienciabga.edu.co",
                adjunto: "",
              }),
            },
            {
              id: "2",
              data: () => ({
                titulo: "Otro ticket",
                descripcion: "Detalle del ticket",
                estado: "proceso",
                prioridad: "alta",
                gestor: "otro@unicienciabga.edu.co",
                adjunto: "https://example.com/archivo.pdf",
              }),
            },
          ];
          // Filtrar por gestor si es rol gestor
          const filtered = currentRole === "gestor" ? ticketsFake.filter(t => t.data().gestor === currentUser.email) : ticketsFake;
          callback({ docs: filtered });
        },
      }),
      onSnapshot: (callback) => {
        // Simular todos tickets
        const ticketsFake = [
          {
            id: "1",
            data: () => ({
              titulo: "Prueba",
              descripcion: "Esto es una prueba",
              estado: "abierto",
              prioridad: "baja",
              gestor: "aux.sistemas@unicienciabga.edu.co",
              adjunto: "",
            }),
          },
          {
            id: "2",
            data: () => ({
              titulo: "Otro ticket",
              descripcion: "Detalle del ticket",
              estado: "proceso",
              prioridad: "alta",
              gestor: "otro@unicienciabga.edu.co",
              adjunto: "https://example.com/archivo.pdf",
            }),
          },
        ];
        callback({ docs: ticketsFake });
      },
    }),
  };

  // Función para cambiar estado de ticket (simulada)
  function cambiarEstado(id, nuevoEstado) {
    alert(`Cambiar estado ticket ${id} a ${nuevoEstado}`);
    // Aquí la lógica para actualizar Firestore
  }

  // Función para eliminar ticket (simulada)
  function eliminarTicket(id) {
    if(confirm("¿Eliminar este ticket?")) {
      alert(`Ticket ${id} eliminado`);
      // Aquí la lógica para eliminar en Firestore
    }
  }

  // Función para UI reasignar ticket (simulada)
  function reasignarTicketUI(id) {
    alert(`Mostrar UI para reasignar ticket ${id}`);
    // Aquí abrir modal o formulario para reasignar
  }

  // Función para cargar tickets y mostrar en pantalla
  function cargarTickets() {
    let query = db.collection("tickets");
    if (currentRole === "usuario") query = query.where("usuario", "==", currentUser.email);
    if (currentRole === "gestor") query = query.where("gestor", "==", currentUser.email);

    query.onSnapshot(snapshot => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      snapshot.docs.forEach(doc => {
        const t = doc.data();

        // Crear tarjeta con clase según prioridad
        const div = document.createElement("div");
        div.className = `ticket-card ${t.prioridad}`;

        // Contenido de ticket
        div.innerHTML = `
          <div class="ticket-title">${t.titulo}</div>
          <div class="priority-badge ${t.prioridad}">${t.prioridad}</div>
          <div class="ticket-desc">${t.descripcion}</div>
          <div class="ticket-info"><b>Estado:</b> ${t.estado}</div>
          <div class="ticket-info"><b>Gestor:</b> ${t.gestor || "Sin asignar"}</div>
          ${t.adjunto ? `<div><a href="${t.adjunto}" target="_blank">Ver archivo adjunto</a></div>` : ""}
          <div class="ticket-actions"></div>
        `;

        // Botones acciones según rol
        const actionsDiv = div.querySelector(".ticket-actions");

        if (currentRole === "gestor" && t.gestor === currentUser.email) {
          if (t.estado !== "proceso") {
            const btnProceso = document.createElement("button");
            btnProceso.className = "btn-proceso";
            btnProceso.textContent = "Proceso";
            btnProceso.onclick = () => cambiarEstado(doc.id, "proceso");
            actionsDiv.appendChild(btnProceso);
          }
          if (t.estado !== "cerrado") {
            const btnCerrar = document.createElement("button");
            btnCerrar.className = "btn-cerrar";
            btnCerrar.textContent = "Cerrar";
            btnCerrar.onclick = () => cambiarEstado(doc.id, "cerrado");
            actionsDiv.appendChild(btnCerrar);
          }
        }

        if (currentRole === "admin") {
          const btnAsignar = document.createElement("button");
          btnAsignar.className = "btn-asignar";
          btnAsignar.textContent = "Asignar";
          btnAsignar.onclick = () => reasignarTicketUI(doc.id);
          actionsDiv.appendChild(btnAsignar);

          const btnEliminar = document.createElement("button");
          btnEliminar.className = "btn-eliminar";
          btnEliminar.textContent = "Eliminar";
          btnEliminar.onclick = () => eliminarTicket(doc.id);
          actionsDiv.appendChild(btnEliminar);

          const btnReasignar = document.createElement("button");
          btnReasignar.className = "btn-reasignar";
          btnReasignar.textContent = "Reasignar";
          btnReasignar.onclick = () => reasignarTicketUI(doc.id);
          actionsDiv.appendChild(btnReasignar);
        }

        lista.appendChild(div);
      });
    });
  }

  // Ejecutar al cargar
  cargarTickets();
</script>
