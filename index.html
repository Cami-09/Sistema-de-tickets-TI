<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Tickets TI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{font-family:Arial;background:#f5f6fa;margin:0}

#login{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card i{
font-size:30px;
margin-bottom:10px;
}

.modulo{
display:none;
padding:20px;
}

.form-card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

.ticket{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.user-item{
background:white;
padding:10px;
margin:5px 0;
border-radius:8px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<button onclick="login()">Iniciar con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="dashboard">

<div class="card" onclick="abrir('crear')">
<i class="fas fa-plus-circle"></i>
Crear Ticket
</div>

<div class="card" onclick="abrir('consultar')">
<i class="fas fa-search"></i>
Consultar
</div>

<div class="card" onclick="abrir('admin')">
<i class="fas fa-cogs"></i>
Administrar
</div>

<div class="card" onclick="abrir('usuarios')">
<i class="fas fa-users-cog"></i>
Usuarios
</div>

</div>

</div>

<!-- CREAR -->
<div id="crear" class="modulo">
<button onclick="volver()">⬅</button>
<h2>Crear Ticket</h2>

<div class="form-card">
<input id="titulo" placeholder="Título">
<input id="descripcion" placeholder="Descripción">
<button onclick="crearTicket()">Guardar</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="modulo">
<button onclick="volver()">⬅</button>
<h2>Administrar Tickets</h2>
<div id="listaAdmin"></div>
</div>

<!-- USUARIOS -->
<div id="usuarios" class="modulo">
<button onclick="volver()">⬅</button>

<h2>Usuarios</h2>

<div class="form-card">
<input id="correoUser" placeholder="Correo">

<select id="rolUser">
<option value="usuario">Usuario</option>
<option value="gestor">Gestor</option>
<option value="admin">Admin</option>
</select>

<label><input type="checkbox" id="pCrear"> Crear</label>
<label><input type="checkbox" id="pConsultar"> Consultar</label>
<label><input type="checkbox" id="pAdmin"> Admin</label>
<label><input type="checkbox" id="pUsuarios"> Usuarios</label>

<button onclick="guardarUsuario()">Guardar</button>
</div>

<div id="listaUsuarios"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
  authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
  projectId: "sistema-de-tickets-ti-b12f5",
  storageBucket: "sistema-de-tickets-ti-b12f5.firebasestorage.app",
  messagingSenderId: "356054718850",
  appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user=null;
let permisosUsuario={};
let editId=null;

/* LOGIN */
window.login=()=>{
const provider = new GoogleAuthProvider();
signInWithRedirect(auth, provider).catch(error=>{
console.error(error);
alert(error.message);
});
};

/* 🔥 DETECTAR USUARIO SIEMPRE */
onAuthStateChanged(auth, (u)=>{
if(u){
mostrar(u);
}
});

/* MOSTRAR DASHBOARD */
function mostrar(u){
user=u;
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
obtenerRol(user.email);
}

/* OBTENER PERMISOS */
async function obtenerRol(email){
const q = query(collection(db,"usuarios"), where("correo","==",email));
const snap = await getDocs(q);

if(!snap.empty){
const data = snap.docs[0].data();
permisosUsuario = data.permisos || {};
}

controlAcceso();
}

/* CONTROL ACCESO */
function controlAcceso(){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");

if(permisosUsuario.crear)
document.querySelector("[onclick=\"abrir('crear')\"]").style.display="block";

if(permisosUsuario.consultar)
document.querySelector("[onclick=\"abrir('consultar')\"]").style.display="block";

if(permisosUsuario.admin)
document.querySelector("[onclick=\"abrir('admin')\"]").style.display="block";

if(permisosUsuario.usuarios)
document.querySelector("[onclick=\"abrir('usuarios')\"]").style.display="block";
}

/* NAVEGACIÓN */
window.abrir=(id)=>{
document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
document.getElementById(id).style.display="block";

if(id==="admin") cargarAdmin();
if(id==="usuarios") cargarUsuarios();
};

window.volver=()=>{
document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
};

/* CREAR TICKET */
window.crearTicket=async()=>{
await addDoc(collection(db,"tickets"),{
titulo: titulo.value,
descripcion: descripcion.value,
estado:"pendiente",
usuario:user.email
});
alert("Ticket creado");
};

/* ADMIN */
function cargarAdmin(){
onSnapshot(collection(db,"tickets"), snap=>{
listaAdmin.innerHTML="";
snap.forEach(docu=>{
const t = docu.data();
const id = docu.id;

listaAdmin.innerHTML+=`
<div class="ticket">
<b>${t.titulo}</b><br>
Estado: ${t.estado}<br>

<button onclick="enProceso('${id}')">⏳</button>
<button onclick="eliminar('${id}')">🗑</button>
</div>
`;
});
});
}

window.enProceso=async(id)=>{
if(!permisosUsuario.admin) return alert("No autorizado");
await updateDoc(doc(db,"tickets",id),{estado:"en proceso"});
};

window.eliminar=async(id)=>{
if(!permisosUsuario.admin) return alert("No autorizado");
await deleteDoc(doc(db,"tickets",id));
};

/* USUARIOS */
window.guardarUsuario=async()=>{

const data={
correo: correoUser.value,
rol: rolUser.value,
permisos:{
crear:pCrear.checked,
consultar:pConsultar.checked,
admin:pAdmin.checked,
usuarios:pUsuarios.checked
}
};

if(editId){
await updateDoc(doc(db,"usuarios",editId),data);
editId=null;
}else{
await addDoc(collection(db,"usuarios"),data);
}

cargarUsuarios();
};

function cargarUsuarios(){
onSnapshot(collection(db,"usuarios"), snap=>{
listaUsuarios.innerHTML="";
snap.forEach(docu=>{
const u=docu.data();
const id=docu.id;

listaUsuarios.innerHTML+=`
<div class="user-item">
${u.correo}
<div>
<button onclick="editar('${id}')">✏️</button>
<button onclick="delUser('${id}')">🗑</button>
</div>
</div>
`;
});
});
}

window.editar=async(id)=>{
const q = await getDocs(collection(db,"usuarios"));
q.forEach(d=>{
if(d.id===id){
const u=d.data();
correoUser.value=u.correo;
rolUser.value=u.rol;
pCrear.checked=u.permisos.crear;
pConsultar.checked=u.permisos.consultar;
pAdmin.checked=u.permisos.admin;
pUsuarios.checked=u.permisos.usuarios;
editId=id;
}
});
};

window.delUser=async(id)=>{
await deleteDoc(doc(db,"usuarios",id));
};

</script>
</body>
</html>
