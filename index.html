<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TIC UNICIENCIA - FULL INTERFACE</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #00bcd4; --purple: #8b5cf6; --gray: #64748b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }

        /* DASHBOARD */
        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }

        .modulo { display: none; background: white; padding: 25px; border-radius: 12px; min-height: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* TABLAS Y CABECERAS */
        .header-blue { background: var(--primary); color: white; padding: 12px 15px; border-radius: 8px 8px 0 0; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; font-size: 0.85rem; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }

        /* BOTONES DE ACCIÓN (Llamativos) */
        .btn-acc { width: 32px; height: 32px; border-radius: 6px; border: none; color: white; cursor: pointer; margin-right: 3px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; }
        .bg-v { background: var(--info); }
        .bg-p { background: var(--warning); }
        .bg-r { background: var(--purple); }
        .bg-c { background: var(--success); }
        .bg-d { background: var(--danger); }
        .bg-h { background: var(--gray); }

        /* MODALES DISEÑO BONITO */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 2% auto; padding: 30px; width: 90%; max-width: 1000px; border-radius: 16px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        
        /* Formulario Estilo Imagen (Etiqueta - Input) */
        .grid-bonito { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px 40px; margin-top: 20px; }
        .campo-group { display: flex; align-items: center; justify-content: space-between; }
        .campo-group label { font-weight: 600; color: #475569; font-size: 0.9rem; width: 160px; }
        .campo-group input, .campo-group select { flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; transition: 0.3s; }
        .campo-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* Periféricos */
        .perifericos-grid { display: flex; gap: 25px; justify-content: center; margin-top: 25px; padding: 20px; background: #f8fafc; border-radius: 12px; border: 1px dashed #cbd5e1; }
        .icon-box { font-size: 1.8rem; color: #94a3b8; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 50%; }
        .icon-box.active { color: var(--primary); background: #eff6ff; transform: scale(1.2); }

        .btn { padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #e2e8f0; color: #475569; }
        .btn-blue:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white; padding:5px 12px;">Salir</button>
</header>

<div id="login" style="display:flex; height:80vh; justify-content:center; align-items:center;">
    <button class="btn btn-blue" onclick="login()"><i class="fab fa-google"></i> Ingresar con Google</button>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" onclick="abrir('mod_tickets_admin')"><i class="fas fa-clipboard-list"></i><h3>Administrar Tickets</h3></div>
        <div class="card" onclick="abrir_maestro('inventario', 'Equipos Administrativos')"><i class="fas fa-desktop"></i><h3>Inventario Admin</h3></div>
        <div class="card" onclick="abrir_maestro('inventario_salas', 'Equipos de Salas')"><i class="fas fa-laptop"></i><h3>Inventario Salas</h3></div>
        <div class="card" onclick="abrir_maestro('aulas_dti', 'Aulas DTI')"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
        <div class="card" onclick="abrir_maestro('salas_sistemas', 'Salas Sistemas')"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
        <div class="card" onclick="abrir_maestro('impresoras', 'Impresoras')"><i class="fas fa-print"></i><h3>Impresoras</h3></div>
    </div>

    <div id="mod_maestro" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <button onclick="volver()" class="btn btn-gray"><i class="fas fa-arrow-left"></i> Volver</button>
            <h2 id="m_titulo" style="color:var(--dark); margin:0;"></h2>
            <button class="btn btn-blue" onclick="abrirModalRegistro()">+ Agregar Registro</button>
        </div>
        
        <div class="header-blue" id="m_header_tab">Listado</div>
        <div style="overflow-x:auto; border: 1px solid #e2e8f0; border-radius: 0 0 8px 8px;">
            <table>
                <thead id="m_thead"></thead>
                <tbody id="m_tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalRegistro" class="modal">
    <div class="modal-content">
        <h2 id="modal_tit" style="margin-top:0; color:var(--dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">Nuevo Registro</h2>
        
        <div class="grid-bonito" id="form_dinamico">
            </div>

        <div id="seccion_perifericos" style="display:none;">
            <h4 style="text-align:center; color:#64748b; margin-bottom:0; margin-top:25px;">Periféricos y Conectividad</h4>
            <div class="perifericos-grid">
                <i class="fas fa-desktop icon-box" onclick="this.classList.toggle('active')" title="Monitor"></i>
                <i class="fas fa-tv icon-box" onclick="this.classList.toggle('active')" title="Televisor"></i>
                <i class="fas fa-fan icon-box" onclick="this.classList.toggle('active')" title="Aire Acondicionado"></i>
                <i class="fas fa-video icon-box" onclick="this.classList.toggle('active')" title="Cámara"></i>
                <i class="fas fa-network-wired icon-box" onclick="this.classList.toggle('active')" title="Red LAN"></i>
                <i class="fas fa-plug icon-box" onclick="this.classList.toggle('active')" title="HDMI/VGA"></i>
            </div>
        </div>

        <div style="margin-top:30px; text-align:right; display:flex; gap:12px; justify-content:flex-end; border-top: 1px solid #f1f5f9; padding-top: 20px;">
            <button class="btn btn-blue" onclick="guardarDatoMaestro()"><i class="fas fa-save"></i> Guardar Registro</button>
            <button class="btn btn-gray" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let currentColl = "", localData = [], selectedId = "";

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u){ document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block'; } });

    function abrir_maestro(coll, tit) {
        currentColl = coll;
        document.getElementById('m_titulo').innerText = tit;
        document.getElementById('panel-principal').style.display = 'none';
        document.getElementById('mod_maestro').style.display = 'block';
        
        db.collection(currentColl).onSnapshot(snap => {
            localData = []; snap.forEach(doc => localData.push({id: doc.id, ...doc.data()}));
            renderTabla();
        });
    }

    function renderTabla() {
        const thead = document.getElementById('m_thead');
        const tbody = document.getElementById('m_tbody');
        tbody.innerHTML = "";
        
        if(currentColl.includes('inventario')) {
            thead.innerHTML = `<tr><th>Nombre PC</th><th>Inventario</th><th>Responsable</th><th>Sede</th><th>Acciones</th></tr>`;
            localData.forEach(d => {
                tbody.innerHTML += `<tr><td><b>${d.pc || ''}</b></td><td>${d.placa || ''}</td><td>${d.res || ''}</td><td>${d.sed || ''}</td><td>${getBotones(d.id)}</td></tr>`;
            });
        } else {
            thead.innerHTML = `<tr><th>Nombre</th><th>Campus</th><th>Sede</th><th>Ubicación</th><th>Acciones</th></tr>`;
            localData.forEach(d => {
                tbody.innerHTML += `<tr><td><b>${d.nom || ''}</b></td><td>${d.cam || ''}</td><td>${d.sed || ''}</td><td>${d.ubi || ''}</td><td>${getBotones(d.id)}</td></tr>`;
            });
        }
    }

    function getBotones(id) {
        return `
            <button class="btn-acc bg-v"><i class="fas fa-eye"></i></button>
            <button class="btn-acc bg-p"><i class="fas fa-tools"></i></button>
            <button class="btn-acc bg-r"><i class="fas fa-copy"></i></button>
            <button class="btn-acc bg-h"><i class="fas fa-history"></i></button>
            <button class="btn-acc bg-d" onclick="eliminar('${id}')"><i class="fas fa-trash"></i></button>
        `;
    }

    function abrirModalRegistro() {
        const form = document.getElementById('form_dinamico');
        const peri = document.getElementById('seccion_perifericos');
        form.innerHTML = "";
        peri.style.display = "none";

        if(currentColl.includes('inventario')) {
            // ESTRUCTURA 18 CAMPOS (Basado en tu imagen)
            const campos = [
                ["Nombre PC", "i_pc"], ["Tipo Equipo", "i_tip", "select", ["Portátil", "Torre", "AIO"]],
                ["Modelo", "i_mod"], ["Placa Inv.", "i_pla"],
                ["S. Operativo", "i_so", "select", ["Windows 10", "Windows 11"]], ["Procesador", "i_pro"],
                ["RAM", "i_ram", "select", ["8 GB", "16 GB", "32 GB"]], ["Disco Duro", "i_dis"],
                ["Dirección IP", "i_ip"], ["Terminal", "i_ter"],
                ["Responsable", "i_res"], ["Dependencia", "i_dep", "select", ["Sistemas", "Tesorería"]],
                ["Correo", "i_cor"], ["Campus", "i_cam", "select", ["Bucaramanga", "Bogotá"]],
                ["Sede", "i_sed", "select", ["Sede A", "Sede B", "Sede C", "Sede D"]], ["Extensión", "i_ext"],
                ["Fecha Reg.", "i_fec", "date"], ["Observaciones", "i_obs"]
            ];
            campos.forEach(c => form.innerHTML += crearInput(c));
        } else {
            peri.style.display = "block";
            const campos = [
                ["Nombre", "e_nom"], ["Campus", "e_cam", "select", ["Bucaramanga", "Bogotá"]],
                ["Sede", "e_sed", "select", ["Sede A", "Sede B", "Sede C", "Sede D"]], ["Ubicación", "e_ubi"]
            ];
            campos.forEach(c => form.innerHTML += crearInput(c));
        }
        document.getElementById('modalRegistro').style.display = 'block';
    }

    function crearInput(c) {
        let input = `<input type="${c[2] || 'text'}" id="${c[1]}">`;
        if(c[2] === "select") {
            input = `<select id="${c[1]}">${c[3].map(o => `<option>${o}</option>`).join('')}</select>`;
        }
        return `<div class="campo-group"><label>${c[0]}</label>${input}</div>`;
    }

    async function guardarDatoMaestro() {
        let obj = {};
        const inputs = document.querySelectorAll('#form_dinamico input, #form_dinamico select');
        inputs.forEach(i => obj[i.id.split('_')[1]] = i.value);
        
        await db.collection(currentColl).add(obj);
        cerrarModales();
    }

    function volver() { document.getElementById('panel-principal').style.display = 'grid'; document.querySelectorAll('.modulo').forEach(m => m.style.display = 'none'); }
    function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    async function eliminar(id) { if(confirm("¿Eliminar?")) await db.collection(currentColl).doc(id).delete(); }
</script>
</body>
</html>
