<!DOCTYPE html>
<html>
<head>
  <title>Tickets PRO - Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; padding:0; }
    header { background:#4285F4; color:white; padding:15px; font-size:24px; text-align:center; position:relative; }
    .tabs { display:flex; background:#e0e0e0; justify-content:center; }
    .tabs button { padding:12px 25px; border:none; background:none; cursor:pointer; font-size:16px; transition:0.3s; }
    .tabs button.active { background:#4285F4; color:white; border-radius:6px 6px 0 0; }
    .modulo { display:none; padding:20px; }
    .card { background:white; border-radius:12px; padding:15px; margin:15px 0; transition:0.3s; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .card:hover { box-shadow:0 5px 15px rgba(0,0,0,0.2); }
    .badge { padding:4px 10px; border-radius:6px; color:white; font-weight:bold; }
    .badge.baja { background:#4CAF50; }
    .badge.media { background:#FF9800; }
    .badge.alta { background:#F44336; }
    button { cursor:pointer; margin:5px 0; padding:8px 12px; border:none; border-radius:6px; }
    #logoutBtn { position:absolute; top:15px; right:15px; background:#F44336; color:white; }
    input, select { padding:8px; margin:5px 0; width:100%; box-sizing:border-box; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    table, th, td { border:1px solid #ccc; border-radius:6px; }
    th { background:#4285F4; color:white; }
    td button { padding:4px 8px; margin:2px; font-size:12px; }
    @keyframes flash {0%{background-color:#fff;}50%{background-color:#ffff99;}100%{background-color:#fff;}}
  </style>
</head>
<body>

<header>🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<!-- LOGIN -->
<div id="loginDiv" style="padding:20px; text-align:center;">
  <button id="loginBtn" style="padding:12px 25px; background:#4285F4; color:white; border:none; border-radius:6px; font-size:16px;">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <!-- TABS -->
  <div class="tabs">
    <button class="tabBtn active" onclick="mostrarModulo('crearTicket', this)">Crear Ticket</button>
    <button class="tabBtn" onclick="mostrarModulo('listaTickets', this)">Lista de Tickets</button>
    <button class="tabBtn" onclick="mostrarModulo('usuariosSection', this)">Gestión de Usuarios</button>
  </div>

  <!-- Crear Ticket -->
  <div id="crearTicket" class="modulo" style="display:block;">
    <div class="card">
      <h3>Crear Ticket</h3>
      <input id="titulo" placeholder="Título">
      <input id="desc" placeholder="Descripción">
      <select id="prioridad">
        <option>baja</option>
        <option>media</option>
        <option>alta</option>
      </select>
      <input type="file" id="file">
      <button onclick="crear()">Enviar Ticket</button>
    </div>
  </div>

  <!-- Lista Tickets -->
  <div id="listaTickets" class="modulo">
    <div id="lista"></div>
  </div>

  <!-- Gestión de Usuarios -->
  <div id="usuariosSection" class="modulo">
    <div class="card">
      <h3>Gestión de Usuarios (Solo Admin)</h3>

      <!-- Formulario Agregar Usuario -->
      <h4>Agregar Usuario</h4>
      <input id="emailUser" placeholder="Email">
      <input id="nombreUser" placeholder="Nombre">
      <select id="rolUser">
        <option>Usuario</option>
        <option>Gestor</option>
        <option>Admin</option>
      </select>
      <button onclick="agregarUsuario()">Agregar Usuario</button>

      <h4>Usuarios Registrados:</h4>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // ==================== FIREBASE ====================
  const firebaseConfig = {
    apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
    authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
    projectId: "sistema-de-tickets-ti-b12f5",
    storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
    messagingSenderId: "356054718850",
    appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();
  let currentUser, currentRole;

  // ==================== LOGIN ====================
  document.getElementById("loginBtn").addEventListener("click", () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  });

  auth.onAuthStateChanged(async user => {
    if(!user) return;
    currentUser = user;

    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    const roleRef = db.collection("roles").doc(user.email);
    let doc = await roleRef.get();

    // Admin fijo
    if(user.email === "camicarmona1212@gmail.com"){
        await roleRef.set({ rol: "admin", nombre: "Camilo Carmona" });
        doc = await roleRef.get();
    }

    if(!doc.exists){
        await roleRef.set({ rol: "usuario", nombre: user.displayName });
        doc = await roleRef.get();
    }

    currentRole = doc.data().rol;

    // Mostrar/ocultar modulo
    document.querySelectorAll(".tabBtn").forEach(btn => {
        if(btn.textContent === "Gestión de Usuarios"){
            btn.style.display = currentRole === "admin" ? "inline-block" : "none";
        }
    });
    document.getElementById("usuariosSection").style.display =
        currentRole === "admin" ? "block" : "none";

    cargarUsuarios();
    cargarTickets();
  });

  // ==================== MODULOS ====================
  function mostrarModulo(id, btn){
    if(currentRole!=="admin" && id==="usuariosSection"){ alert("No tienes permiso"); return; }
    document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
    document.getElementById(id).style.display="block";
    document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }

  // ==================== TICKETS ====================
  async function crear(){
    let url="";
    const f=file.files[0];
    if(f){
      const ref=storage.ref("tickets/"+Date.now());
      await ref.put(f); 
      url=await ref.getDownloadURL();
    }
    await db.collection("tickets").add({
      titulo:titulo.value,
      descripcion:desc.value,
      estado:"abierto",
      prioridad:prioridad.value,
      usuario:currentUser.email,
      nombreUsuario: currentUser.displayName,
      tecnico:"",
      nombreGestor:"",
      adjunto:url,
      fecha:new Date(),
      historial:[]
    });
    alert("Ticket creado");
    cargarTickets();
  }

  function acciones(id,t){
    let b="";
    if(currentRole==="gestor"||currentRole==="admin"){
      b+=`<button onclick="asignar('${id}')">Asignarme</button>`;
      b+=`<button onclick="estado('${id}','proceso')">Proceso</button>`;
      b+=`<button onclick="estado('${id}','cerrado')">Cerrar</button>`;
    }
    if(currentRole==="admin"){
      b+=`<button onclick="eliminarTicket('${id}')" style="background:red;color:white;">Eliminar</button>`;
      b+=`<button onclick="reasignarTicket('${id}')">Reasignar</button>`;
    }
    return b;
  }

  function asignar(id){actualizar(id,{tecnico:currentUser.email, nombreGestor: currentUser.displayName},"Asignado");}
  function estado(id,e){actualizar(id,{estado:e},"Cambio estado a "+e);}
  async function actualizar(id,cambios,accion){
    const docRef=db.collection("tickets").doc(id);
    const doc=await docRef.get();
    const historial=doc.data().historial||[];
    historial.push({accion,usuario:currentUser.email,fecha:new Date()});
    await docRef.update({...cambios,historial});
    cargarTickets();
  }

  async function cargarTickets(){
    let query=db.collection("tickets");
    if(currentRole==="usuario") query=query.where("usuario","==",currentUser.email);
    if(currentRole==="gestor") query=query.where("tecnico","in",["",currentUser.email]);
    query.onSnapshot(snapshot=>{
      lista.innerHTML="";
      snapshot.docs.forEach(doc=>{
        const t=doc.data();
        let color=t.prioridad==="alta"?"#F44336":t.prioridad==="media"?"#FF9800":"#4CAF50";
        const div=document.createElement("div");
        div.className="card";
        div.style.borderLeft=`6px solid ${color}`;
        div.innerHTML=`
          <b>${t.titulo}</b> <span class="badge ${t.prioridad}">${t.prioridad}</span><br>
          ${t.descripcion}<br>
          Estado: <span style="font-weight:bold">${t.estado}</span><br>
          Gestor: ${t.nombreGestor||"Sin asignar"}<br>
          ${t.adjunto?`<a href="${t.adjunto}" target="_blank">Ver archivo</a>`:""}<br>
          ${acciones(doc.id,t)}
          <input id="c-${doc.id}" placeholder="Comentario"><button onclick="comentar('${doc.id}')">Enviar</button>
        `;
        lista.prepend(div);
        div.style.animation="flash 1s ease-in-out";
      });
    });
  }

  function comentar(id){
    const texto=document.getElementById("c-"+id).value;
    if(!texto) return;
    db.collection("tickets").doc(id).collection("comentarios").add({
      texto,
      usuario:currentUser.email,
      fecha:new Date()
    });
  }

  // ==================== USUARIOS ====================
  function agregarUsuario(){
    const email = document.getElementById("emailUser").value.trim();
    const nombre = document.getElementById("nombreUser").value.trim();
    const rol = document.getElementById("rolUser").value;
    if(!email||!nombre){alert("Ingrese email y nombre"); return;}
    db.collection("roles").doc(email).set({nombre, rol}).then(()=>{
      alert("Usuario agregado");
      document.getElementById("emailUser").value="";
      document.getElementById("nombreUser").value="";
      cargarUsuarios();
    });
  }

  async function cargarUsuarios(){
    if(currentRole!=="admin") return;
    const tabla = document.getElementById("tablaUsuarios");
    tabla.innerHTML="";
    const snap = await db.collection("roles").get();
    snap.forEach(doc=>{
      const email = doc.id;
      const data = doc.data();
      const tr = document.createElement("tr");
      tr.innerHTML=`
        <td>${email}</td>
        <td>${data.nombre}</td>
        <td>
          <select id="rol-${email}">
            <option ${data.rol==="Usuario"?"selected":""}>Usuario</option>
            <option ${data.rol==="Gestor"?"selected":""}>Gestor</option>
            <option ${data.rol==="Admin"?"selected":""}>Admin</option>
          </select>
        </td>
        <td>
          <button onclick="actualizarRol('${email}')" style="background:#4CAF50;color:white;">Actualizar</button>
          <button onclick="eliminarUsuario('${email}')" style="background:#F44336;color:white;">Eliminar</button>
        </td>
      `;
      tabla.appendChild(tr);
    });
  }

  async function actualizarRol(email){
    const rol = document.getElementById("rol-"+email).value;
    await db.collection("roles").doc(email).update({ rol });
    alert("Rol actualizado");
    cargarUsuarios();
  }

  async function eliminarUsuario(email){
    if(!confirm("Eliminar usuario y su rol?")) return;
    await db.collection("roles").doc(email).delete();
    alert("Usuario eliminado");
    cargarUsuarios();
  }

  // ==================== ELIMINAR / REASIGNAR ====================
  async function eliminarTicket(id){
    if(!confirm("Eliminar ticket?")) return;
    await db.collection("tickets").doc(id).delete();
    alert("Ticket eliminado");
  }

  async function reasignarTicket(id){
    const snap = await db.collection("roles").where("rol","==","Gestor").get();
    if(snap.empty){alert("No hay gestores disponibles"); return;}
    let opciones="";
    snap.forEach(doc=>{
      const nombre = doc.data().nombre || doc.id;
      opciones += `<option value="${doc.id}">${nombre}</option>`;
    });

    const modal = document.createElement("div");
    modal.id = "modalReasignar";
    modal.style.position="fixed";
    modal.style.top="0"; modal.style.left="0"; modal.style.width="100%";
    modal.style.height="100%";
    modal.style.background="rgba(0,0,0,0.5)";
    modal.style.display="flex"; modal.style.justifyContent="center"; modal.style.alignItems="center";
    modal.innerHTML=`
      <div style="background:white;padding:20px;border-radius:10px;width:300px;text-align:center;">
        <h3>Reasignar Ticket</h3>
        <select id="nuevoGestor" style="width:100%;padding:8px;">${opciones}</select>
        <br><br>
        <button onclick="confirmarReasignacion('${id}')" style="background:#4CAF50;color:white;">Aceptar</button>
        <button onclick="cerrarModal()" style="background:#F44336;color:white;">Cancelar</button>
      </div>
    `;
    document.body.appendChild(modal);
  }

  async function confirmarReasignacion(id){
    const select = document.getElementById("nuevoGestor");
    const email = select.value;
    const nombre = select.options[select.selectedIndex].text;
    const docRef = db.collection("tickets").doc(id);
    const doc = await docRef.get();
    const historial = doc.data().historial || [];
    historial.push({accion:"Reasignado a "+nombre, usuario:currentUser.email, fecha:new Date()});
    await docRef.update({tecnico:email, nombreGestor:nombre, historial});
    cerrarModal();
    alert("Ticket reasignado correctamente");
  }

  function cerrarModal(){
    const modal = document.getElementById("modalReasignar");
    if(modal) modal.remove();
  }

  // ==================== CERRAR SESION ====================
  function cerrarSesion(){
    auth.signOut().then(()=>{
      currentUser=null; currentRole=null;
      document.getElementById("dashboard").style.display="none";
      document.getElementById("loginDiv").style.display="block";
    });
  }

</script>
</body>
</html>
