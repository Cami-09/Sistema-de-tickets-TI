<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TIC UNICIENCIA - MASTER FINAL V3</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --purple: #8b5cf6; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #00bcd4; --gray: #64748b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }

        .modulo { display: none; background: white; padding: 25px; border-radius: 12px; min-height: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* FILTROS Y TABLAS */
        .filtros-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-filtros { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .header-blue { background: var(--primary); color: white; padding: 10px 15px; border-radius: 5px 5px 0 0; font-weight: bold; }

        input, select, textarea { padding: 9px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 0.9rem; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

        /* ACCIONES ICONOS */
        .btn-acc { width: 32px; height: 32px; border-radius: 4px; border: none; color: white; cursor: pointer; margin-right: 2px; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }
        .bg-edit { background: var(--warning); }
        .bg-tools { background: var(--primary); }
        .bg-view { background: var(--info); }
        .bg-delete { background: var(--danger); }
        .bg-historial { background: var(--gray); }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 85%; max-width: 850px; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
        .grid-modal { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }

        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: var(--gray); color: white; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white; padding:5px 12px;">Salir</button>
</header>

<div id="login" style="display:flex; height:80vh; justify-content:center; align-items:center;">
    <button class="btn btn-blue" onclick="login()"><i class="fab fa-google"></i> Ingresar con Google</button>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" onclick="abrir('consultar')"><i class="fas fa-search"></i><h3>Tickets</h3></div>
        <div class="card" onclick="abrir('inv_admin')"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
        <div class="card" onclick="abrir('inv_salas')"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
        <div class="card" onclick="abrir('mod_calendario')"><i class="fas fa-calendar-alt"></i><h3>Calendario</h3></div>
        <div class="card" onclick="abrir('mod_aulas')"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
        <div class="card" onclick="abrir('mod_salas_sistemas')"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
        <div class="card" onclick="abrir('mod_impresoras')"><i class="fas fa-print"></i><h3>Impresoras</h3></div>
    </div>

    <div id="mod_impresoras" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px;">
            <button onclick="volver()" class="btn btn-gray">⬅ Volver</button>
            <h2 style="color:var(--primary); margin:0;">Impresoras</h2>
            <h2 style="color:red; margin:0;" id="totalImpresoras">0</h2>
        </div>

        <div class="filtros-box">
            <h3 style="margin-top:0;">Filtros de Búsqueda</h3>
            <div class="grid-filtros">
                <div><label>Nombre Impresora</label><input type="text" id="fi_nombre" onkeyup="filtrarImpresoras()"></div>
                <div><label>Campus</label><select id="fi_campus_f" onchange="filtrarImpresoras()"><option value="">Todos</option><option>Bucaramanga</option><option>Bogotá</option></select></div>
                <div><label>Sede</label><select id="fi_sede_f" onchange="filtrarImpresoras()"><option value="">Todas</option><option>Sede A</option><option>Sede B</option><option>Sede C</option><option>Sede D</option></select></div>
            </div>
            <div style="margin-top:15px; text-align:right; display:flex; justify-content:flex-end; gap:10px;">
                <button class="btn btn-blue" onclick="filtrarImpresoras()"><i class="fas fa-filter"></i> Filtrar</button>
                <button class="btn btn-gray" onclick="limpiarFiltrosImpresoras()"><i class="fas fa-eraser"></i> Limpiar</button>
                <button class="btn btn-blue" style="background:var(--success);" onclick="abrirModalImpresoraRegistro()">+ Agregar Impresora</button>
            </div>
        </div>

        <div class="header-blue">Listado de Impresoras</div>
        <table>
            <thead><tr><th>Nombre</th><th>Marca</th><th>Modelo</th><th>IP</th><th>Campus</th><th>Sede</th><th>Acciones</th></tr></thead>
            <tbody id="tablaImpresoras"></tbody>
        </table>
    </div>

    <div id="modulo_inv" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="volver()" class="btn btn-gray">⬅ Volver</button>
            <h2 id="titulo_inv" style="color:var(--primary); margin:0;"></h2>
            <button class="btn btn-blue" onclick="abrirModalRegistroInv()">+ Registrar equipo</button>
        </div>
        <tbody id="tablaInvData"></tbody>
    </div>

    <div id="mod_aulas" class="modulo"><button onclick="volver()" class="btn btn-gray">Volver</button><tbody id="tablaAulas"></tbody></div>
    <div id="mod_salas_sistemas" class="modulo"><button onclick="volver()" class="btn btn-gray">Volver</button><tbody id="tablaSalasSistemas"></tbody></div>
    <div id="mod_calendario" class="modulo"><button onclick="volver()" class="btn btn-gray">Volver</button><div id="calendar"></div></div>
</div>

<div id="modalImpresora" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="cerrarModales()">&times;</span>
        <h2 id="modalImpresoraTitle">Registrar Impresora</h2>
        <div class="grid-modal">
            <div><label>Nombre de la Impresora</label><input type="text" id="ni_nombre" placeholder="Ej: Impresora Tesorería"></div>
            <div><label>Marca</label><input type="text" id="ni_marca" placeholder="Ej: HP"></div>
            <div><label>Modelo</label><input type="text" id="ni_modelo" placeholder="Ej: LaserJet Pro"></div>
            <div><label>Tipo de Tinta</label><select id="ni_tinta"><option>Toner</option><option>Inyección</option><option>Cinta</option></select></div>
            <div><label>Dirección IP</label><input type="text" id="ni_ip" placeholder="192.168.x.x"></div>
            <div><label>Campus</label><select id="ni_cam"><option>Bucaramanga</option><option>Bogotá</option></select></div>
            <div><label>Sede</label><select id="ni_sed"><option>Sede A</option><option>Sede B</option><option>Sede C</option><option>Sede D</option></select></div>
            <div><label>Ubicación Detallada</label><input type="text" id="ni_ubi" placeholder="Ej: Piso 1 Oficina 102"></div>
        </div>
        <div style="margin-top:25px; text-align:right; display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn btn-blue" onclick="ejecutarGuardarImpresora()"><i class="fas fa-save"></i> Guardar Impresora</button>
            <button class="btn btn-gray" onclick="cerrarModales()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    // CONFIG FIREBASE
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let user, localImpresoras = [], modoModal = "registro", selectedId = "";

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u){ user=u; document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block'; } });

    function abrir(id) {
        document.getElementById('panel-principal').style.display='none';
        document.querySelectorAll('.modulo').forEach(m => m.style.display='none');
        document.getElementById(id).style.display='block';
        if(id === 'mod_impresoras') cargarImpresoras();
    }
    function volver() { document.getElementById('panel-principal').style.display='grid'; document.querySelectorAll('.modulo').forEach(m => m.style.display='none'); }
    function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

    // --- LÓGICA IMPRESORAS ---
    function cargarImpresoras() {
        db.collection("impresoras").orderBy("nombre").onSnapshot(snap => {
            localImpresoras = [];
            snap.forEach(doc => localImpresoras.push({id: doc.id, ...doc.data()}));
            filtrarImpresoras();
        });
    }

    function filtrarImpresoras() {
        const nom = fi_nombre.value.toLowerCase();
        const cam = fi_campus_f.value;
        const sed = fi_sede_f.value;
        const filtrados = localImpresoras.filter(i => (i.nombre||"").toLowerCase().includes(nom) && (cam==="" || i.campus===cam) && (sed==="" || i.sede===sed));
        
        document.getElementById('totalImpresoras').innerText = filtrados.length;
        const b = document.getElementById('tablaImpresoras'); b.innerHTML = "";
        filtrados.forEach(i => {
            b.innerHTML += `<tr><td><b>${i.nombre}</b></td><td>${i.marca}</td><td>${i.modelo}</td><td>${i.ip}</td><td>${i.campus}</td><td>${i.sede}</td>
            <td>
                <button class="btn-acc bg-view" title="Chequeo"><i class="fas fa-check-square"></i></button>
                <button class="btn-acc bg-historial" title="Historial"><i class="fas fa-history"></i></button>
                <button class="btn-acc bg-edit" onclick="abrirEditImpresora('${i.id}')" title="Modificar"><i class="fas fa-edit"></i></button>
                <button class="btn-acc bg-delete" onclick="eliminarImpresora('${i.id}')" title="Eliminar"><i class="fas fa-trash"></i></button>
            </td></tr>`;
        });
    }

    function limpiarFiltrosImpresoras() { fi_nombre.value=""; fi_campus_f.value=""; fi_sede_f.value=""; filtrarImpresoras(); }
    function abrirModalImpresoraRegistro() { modoModal="registro"; document.getElementById('modalImpresoraTitle').innerText="Registrar Impresora"; document.getElementById('modalImpresora').style.display='block'; }

    async function ejecutarGuardarImpresora() {
        const obj = { nombre: ni_nombre.value, marca: ni_marca.value, modelo: ni_modelo.value, tinta: ni_tinta.value, ip: ni_ip.value, campus: ni_cam.value, sede: ni_sed.value, ubicacion: ni_ubi.value };
        if(modoModal === "editar") await db.collection("impresoras").doc(selectedId).update(obj);
        else await db.collection("impresoras").add(obj);
        cerrarModales();
    }

    function abrirEditImpresora(id) {
        modoModal = "editar"; selectedId = id;
        const i = localImpresoras.find(x => x.id === id);
        ni_nombre.value = i.nombre; ni_marca.value = i.marca; ni_modelo.value = i.modelo; ni_ip.value = i.ip; ni_ubi.value = i.ubicacion;
        document.getElementById('modalImpresoraTitle').innerText = "Modificar Impresora";
        document.getElementById('modalImpresora').style.display = 'block';
    }

    async function eliminarImpresora(id) { if(confirm("¿Eliminar impresora definitivamente?")) await db.collection("impresoras").doc(id).delete(); }
</script>
</body>
</html>
