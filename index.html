<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tickets TI PRO</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<!-- Iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}

/* HEADER */
header{
background:#0f172a;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* LOGIN */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#login button{
background:#3b82f6;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

/* DASHBOARD */
#dashboard{display:none;padding:30px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* TARJETAS */
.card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.card i{
font-size:40px;
margin-bottom:10px;
color:#2563eb;
}

/* BOTONES */
button{
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.logout{
background:red;
color:white;
}
</style>
</head>

<body>

<header>
<span>🎫 Sistema Tickets TI</span>
<button class="logout" onclick="logout()">Salir</button>
</header>

<!-- LOGIN -->
<div id="login">
<h2>Iniciar sesión</h2>
<button onclick="login()">Iniciar con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Panel de módulos</h2>

<div class="grid">

<div class="card"><i class="fas fa-search"></i><h3>Consultar Tickets</h3></div>
<div class="card"><i class="fas fa-paper-plane"></i><h3>Crear Ticket</h3></div>
<div class="card"><i class="fas fa-user-shield"></i><h3>Administración</h3></div>

<div class="card"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
<div class="card"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
<div class="card"><i class="fas fa-calendar"></i><h3>Calendario</h3></div>

<div class="card"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
<div class="card"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
<div class="card"><i class="fas fa-print"></i><h3>Impresoras</h3></div>

</div>

</div>

<script>
// CONFIG FIREBASE
firebase.initializeApp({
apiKey: "TU_API_KEY",
authDomain: "TU_DOMINIO.firebaseapp.com",
projectId: "TU_PROJECT_ID"
});

const auth = firebase.auth();

// LOGIN (REDIRECT - SOLUCIONA BUG)
function login(){
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithRedirect(provider);
}

// DETECTAR LOGIN
auth.getRedirectResult().then(result=>{
if(result.user){
mostrarSistema(result.user);
}
}).catch(error=>{
console.error(error);
});

auth.onAuthStateChanged(user=>{
if(user){
mostrarSistema(user);
}
});

// MOSTRAR SISTEMA
function mostrarSistema(user){
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}
</script>

</body>
</html>
