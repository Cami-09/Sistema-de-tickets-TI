<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets PRO</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    /* Agregar el CSS que ya tienes aquí */
  </style>
</head>
<body>

<header>🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<!-- LOGIN -->
<div id="loginDiv" style="text-align:center;margin-top:50px;">
  <button id="loginBtn">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;padding:20px;">
  <!-- Aquí se muestran los módulos del Dashboard -->
</div>

<script>
  // Firebase Initialization
  const firebaseConfig = {
    apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
    authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
    projectId: "sistema-de-tickets-ti-b12f5",
    storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
    messagingSenderId: "356054718850",
    appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
  };

  // Inicializar Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser, currentRole;

  // LOGIN
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      const result = await auth.signInWithPopup(provider);
      const user = result.user;
      console.log("Logged in as", user.displayName);

      // Guardar el usuario y navegar al dashboard
      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      // Guardar el rol del usuario
      const roleRef = db.collection("roles").doc(user.email);
      let doc = await roleRef.get();
      if (!doc.exists) {
        await roleRef.set({ rol: "Usuario", nombre: user.displayName });
        doc = await roleRef.get();
      }
      currentRole = doc.data().rol;
      
    } catch (error) {
      console.error("Error during login:", error.message);
      alert("Hubo un error al iniciar sesión. Intenta nuevamente.");
    }
  });

  auth.onAuthStateChanged(async (user) => {
    if (user) {
      currentUser = user;
      console.log("User is logged in", user);
    }
  });

  // Function to handle displaying modules
  function mostrar(id) {
    document.querySelectorAll(".modulo").forEach(m => m.style.display = "none");
    document.getElementById(id).style.display = "block";
  }

  // Logout
  function cerrarSesion() {
    auth.signOut().then(() => {
      currentUser = null;
      currentRole = null;
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginDiv").style.display = "block";
    });
  }

</script>

</body>
</html>
