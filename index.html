<!DOCTYPE html>
<html>
<head>
  <title>Tickets PRO - Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; padding:0; }
    header { background:#4285F4; color:white; padding:15px; font-size:24px; text-align:center; position:relative; }
    #logoutBtn { position:absolute; top:15px; right:15px; background:#F44336; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
    #loginDiv { padding:50px; text-align:center; }
    #loginBtn { padding:15px 30px; background:#4285F4; color:white; border:none; border-radius:6px; font-size:18px; cursor:pointer; }
    .dashboard { display:flex; flex-wrap:wrap; justify-content:center; padding:30px; }
    .card { background:white; border-radius:12px; width:220px; height:150px; margin:15px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:0.3s; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .card:hover { box-shadow:0 5px 15px rgba(0,0,0,0.2); }
    .card span { font-size:36px; margin-bottom:10px; }
    .modulo { display:none; padding:20px; }
    input, select { width:100%; padding:8px; margin:5px 0; box-sizing:border-box; }
    button { cursor:pointer; padding:8px 12px; margin:5px 0; border:none; border-radius:6px; }
    .badge { padding:4px 10px; border-radius:6px; color:white; font-weight:bold; }
    .badge.baja { background:#4CAF50; }
    .badge.media { background:#FF9800; }
    .badge.alta { background:#F44336; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    table, th, td { border:1px solid #ccc; border-radius:6px; }
    th { background:#4285F4; color:white; padding:8px; }
    td { padding:5px; text-align:center; }
    td button { padding:4px 8px; margin:2px; font-size:12px; }
    #mensaje { color:red; }
  </style>
</head>
<body>

<header>
  🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div id="loginDiv">
  <button id="loginBtn">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <div class="dashboard">
    <div class="card" onclick="abrirModulo('crearTicket')"><span>📩</span>Crear Ticket</div>
    <div class="card" onclick="abrirModulo('listaTickets')"><span>🔍</span>Lista de Tickets</div>
    <div class="card" onclick="abrirModulo('usuariosSection')" id="adminCard" style="display:none;"><span>👤</span>Gestión de Usuarios</div>
  </div>

  <!-- Módulos -->
  <div id="crearTicket" class="modulo">
    <h3>Crear Ticket</h3>
    <input id="titulo" placeholder="Título">
    <input id="desc" placeholder="Descripción">
    <select id="prioridad">
      <option>baja</option>
      <option>media</option>
      <option>alta</option>
    </select>
    <input type="file" id="file">
    <button onclick="crear()">Enviar Ticket</button>
  </div>

  <div id="listaTickets" class="modulo">
    <h3>Lista de Tickets</h3>
    <div id="lista"></div>
  </div>

  <div id="usuariosSection" class="modulo">
    <h3>Gestión de Usuarios (Solo Admin)</h3>
    <input id="nombreNuevo" placeholder="Nombre completo">
    <input id="emailNuevo" placeholder="Email">
    <select id="rolNuevo">
      <option>usuario</option>
      <option>gestor</option>
      <option>admin</option>
    </select>
    <button onclick="agregarUsuario()">Agregar Usuario</button>

    <h4>Usuarios Registrados:</h4>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios"></tbody>
    </table>
  </div>
</div>

<script>
  // ===== FIREBASE =====
  const firebaseConfig = {
    apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
    authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
    projectId: "sistema-de-tickets-ti-b12f5",
    storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
    messagingSenderId: "356054718850",
    appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();
  let currentUser = null;
  let currentRole = null;

  // ===== LOGIN =====
  document.getElementById("loginBtn").addEventListener("click", ()=>{
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  });

  auth.onAuthStateChanged(async user=>{
    if(!user) return;
    currentUser=user;
    document.getElementById("loginDiv").style.display="none";
    document.getElementById("dashboard").style.display="block";

    const roleRef = db.collection("roles").doc(user.email);
    let doc = await roleRef.get();

    if(user.email==="camicarmona1212@gmail.com"){
      await roleRef.set({ rol:"admin", nombre:"Camilo Carmona" });
      doc = await roleRef.get();
    }
    if(!doc.exists){
      await roleRef.set({ rol:"usuario", nombre:user.displayName || "Sin nombre" });
      doc = await roleRef.get();
    }
    currentRole=doc.data().rol;

    if(currentRole==="admin") document.getElementById("adminCard").style.display="block";

    cargarUsuarios();
    cargarTickets();
  });

  function cerrarSesion(){
    auth.signOut().then(()=>{
      currentUser=null;
      currentRole=null;
      document.getElementById("dashboard").style.display="none";
      document.getElementById("loginDiv").style.display="block";
    });
  }

  function abrirModulo(id){
    document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
    document.getElementById(id).style.display="block";
  }

  // ===== TICKETS =====
  async function crear(){
    let url="";
    const f=document.getElementById("file").files[0];
    if(f){
      const ref=storage.ref("tickets/"+Date.now());
      await ref.put(f);
      url=await ref.getDownloadURL();
    }
    await db.collection("tickets").add({
      titulo: document.getElementById("titulo").value,
      descripcion: document.getElementById("desc").value,
      estado:"abierto",
      prioridad: document.getElementById("prioridad").value,
      usuario: currentUser.email,
      gestor:"",
      adjunto:url,
      fecha:new Date(),
      historial:[]
    });
    alert("Ticket creado");
  }

  function accionesTicket(t){
    let html="";
    if(currentRole==="gestor"||currentRole==="admin"){
      html+=`<button onclick="asignarTicket('${t.id}')">Asignarme</button>`;
      html+=`<button onclick="cambiarEstado('${t.id}','proceso')">Proceso</button>`;
      html+=`<button onclick="cambiarEstado('${t.id}','cerrado')">Cerrar</button>`;
    }
    if(currentRole==="admin"){
      html+=`<button onclick="eliminarTicket('${t.id}')" style="background:red;color:white;">Eliminar</button>`;
      html+=`<button onclick="reasignarTicket('${t.id}')">Reasignar</button>`;
    }
    return html;
  }

  async function cargarTickets(){
    let query=db.collection("tickets");
    if(currentRole==="usuario") query=query.where("usuario","==",currentUser.email);
    if(currentRole==="gestor") query=query.where("gestor","==",currentUser.email);
    query.onSnapshot(snapshot=>{
      const lista=document.getElementById("lista");
      lista.innerHTML="";
      snapshot.docs.forEach(doc=>{
        const t={id:doc.id,...doc.data()};
        const div=document.createElement("div");
        div.className="card";
        div.style.borderLeft=`6px solid ${t.prioridad==="alta"?"#F44336":t.prioridad==="media"?"#FF9800":"#4CAF50"}`;
        div.innerHTML=`
          <b>${t.titulo}</b> <span class="badge ${t.prioridad}">${t.prioridad}</span><br>
          ${t.descripcion}<br>
          Estado: ${t.estado}<br>
          Gestor: ${t.gestor||"Sin asignar"}<br>
          ${t.adjunto?`<a href="${t.adjunto}" target="_blank">Ver archivo</a>`:""}<br>
          ${accionesTicket(t)}
        `;
        lista.prepend(div);
      });
    });
  }

  async function asignarTicket(id){
    await db.collection("tickets").doc(id).update({gestor:currentUser.email});
  }

  async function cambiarEstado(id,estado){
    const docRef=db.collection("tickets").doc(id);
    const doc=await docRef.get();
    const historial=doc.data().historial||[];
    historial.push({accion:"Cambio a "+estado,usuario:currentUser.email,fecha:new Date()});
    await docRef.update({estado,historial});
  }

  async function eliminarTicket(id){
    if(!confirm("Eliminar ticket?")) return;
    await db.collection("tickets").doc(id).delete();
    alert("Ticket eliminado");
  }

  async function reasignarTicket(id){
    const snap=await db.collection("roles").where("rol","==","gestor").get();
    const gestores = snap.docs.map(d=>({email:d.id,nombre:d.data().nombre}));
    let opciones = "";
    gestores.forEach(g=>opciones+=`<option value="${g.email}">${g.nombre}</option>`);
    const nuevo = prompt(`Seleccione nuevo gestor:\n`+gestores.map(g=>g.nombre).join("\n"));
    if(!nuevo) return;
    const docRef=db.collection("tickets").doc(id);
    const doc=await docRef.get();
    const historial=doc.data().historial||[];
    historial.push({accion:"Reasignado a "+nuevo,usuario:currentUser.email,fecha:new Date()});
    await docRef.update({gestor:nuevo,historial});
    alert("Ticket reasignado a "+nuevo);
  }

  // ===== USUARIOS =====
  async function agregarUsuario(){
    if(currentRole!=="admin"){ alert("Solo admin"); return; }
    const nombre=document.getElementById("nombreNuevo").value;
    const email=document.getElementById("emailNuevo").value;
    const rol=document.getElementById("rolNuevo").value;
    if(!nombre||!email){ alert("Ingrese nombre y email"); return; }
    await db.collection("roles").doc(email).set({nombre,rol});
    alert("Usuario agregado");
    document.getElementById("nombreNuevo").value="";
    document.getElementById("emailNuevo").value="";
    cargarUsuarios();
  }

  async function cargarUsuarios(){
    if(currentRole!=="admin") return;
    const tabla=document.getElementById("tablaUsuarios");
    tabla.innerHTML="";
    const snap=await db.collection("roles").get();
    snap.forEach(doc=>{
      const u={email:doc.id,...doc.data()};
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${u.nombre}</td>
        <td>${u.email}</td>
        <td>${u.rol}</td>
        <td>
          <button onclick="editarUsuario('${u.email}')">✏️</button>
          <button onclick="eliminarUsuario('${u.email}')">❌</button>
        </td>`;
      tabla.appendChild(tr);
    });
  }

  async function editarUsuario(email){
    const doc=await db.collection("roles").doc(email).get();
    if(!doc.exists) return;
    const nombre=prompt("Nombre:",doc.data().nombre);
    const rol=prompt("Rol (usuario, gestor, admin):",doc.data().rol);
    if(nombre && rol){
      await db.collection("roles").doc(email).update({nombre,rol});
      cargarUsuarios();
    }
  }

  async function eliminarUsuario(email){
    if(!confirm("Eliminar usuario?")) return;
    await db.collection("roles").doc(email).delete();
    alert("Usuario eliminado");
    cargarUsuarios();
  }

</script>
</body>
</html>
