<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integral TI - Uniciencia</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }

        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }

        /* DASHBOARD */
        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }
        .card h3 { margin: 10px 0; font-size: 1rem; }

        .modulo { display: none; background: white; padding: 20px; border-radius: 12px; }

        /* FILTROS E INFO */
        .filtros-box { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-filtros { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; }
        .resumen-celeste { background: #e0f2fe; padding: 12px; border-radius: 8px; color: #0369a1; margin-bottom: 15px; text-align: center; font-weight: 500; }

        input, select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 5px; width: 100%; box-sizing: border-box; }

        /* TABLA */
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: #f8fafc; padding: 10px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

        /* ACCIONES */
        .btn-acc { width: 28px; height: 28px; border-radius: 4px; border: none; color: white; cursor: pointer; margin-right: 2px; }
        .bg-edit { background: #f59e0b; }
        .bg-tools { background: #2563eb; }
        .bg-copy { background: #06b6d4; }
        .bg-view { background: #00bcd4; }
        .bg-delete { background: #ef4444; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 85%; max-width: 850px; border-radius: 12px; position: relative; }
        .grid-modal { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #64748b; color: white; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white; padding:5px 12px;">Salir</button>
</header>

<div id="login" style="display:flex; height:80vh; justify-content:center; align-items:center;">
    <button class="btn btn-blue" onclick="login()">Ingresar con Google</button>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" onclick="abrir('consultar')"><i class="fas fa-search"></i><h3>Consultar Tickets</h3></div>
        <div class="card" onclick="abrir('crear')"><i class="fas fa-paper-plane"></i><h3>Enviar un Ticket</h3></div>
        <div class="card" onclick="abrir('admin_tickets')"><i class="fas fa-clipboard-list"></i><h3>Administrar Tickets</h3></div>
        
        <div class="card" onclick="abrir('inv_admin')"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
        <div class="card" onclick="abrir('inv_salas')"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
        
        <div class="card"><i class="fas fa-calendar"></i><h3>Calendario</h3></div>
        <div class="card"><i class="fas fa-school"></i><h3>Aulas DTI</h3></div>
        <div class="card"><i class="fas fa-server"></i><h3>Salas Sistemas</h3></div>
        <div class="card"><i class="fas fa-print"></i><h3>Impresoras</h3></div>
    </div>

    <div id="modulo_inv" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="volver()" class="btn btn-gray">⬅ Volver</button>
            <h2 id="titulo_inv" style="color:var(--primary); margin:0;"></h2>
            <button class="btn btn-blue" onclick="abrirModal()">+ Registrar nuevo equipo</button>
        </div>

        <div id="resumen_conteo" class="resumen-celeste"></div>

        <div class="filtros-box">
            <div class="grid-filtros">
                <select id="f_tipo" onchange="filtrar()"><option value="">-- Tipo --</option><option>Portátil</option><option>AIO</option><option>Torre</option></select>
                <input type="text" id="f_mod" placeholder="Modelo" onkeyup="filtrar()">
                <input type="text" id="f_inv" placeholder="Inventario" onkeyup="filtrar()">
                <input type="text" id="f_res" placeholder="Responsable" onkeyup="filtrar()">
                <select id="f_dep" onchange="filtrar()"><option value="">-- Dependencia --</option><option>Sistemas</option><option>Auditorio</option></select>
                <input type="text" id="f_ip" placeholder="IP" onkeyup="filtrar()">
            </div>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <button class="btn btn-blue" onclick="filtrar()"><i class="fas fa-filter"></i> Aplicar Filtros</button>
                <button class="btn btn-gray" onclick="limpiarFiltros()">Limpiar Filtros</button>
                <button class="btn" style="background:#10b981; color:white;"><i class="fas fa-file-csv"></i> Exportar CSV</button>
            </div>
        </div>

        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr><th>PC</th><th>Tipo</th><th>Modelo</th><th>Inventario</th><th>Responsable</th><th>Dependencia</th><th>Campus</th><th>Sede</th><th>Acciones</th></tr>
                </thead>
                <tbody id="tablaData"></tbody>
            </table>
        </div>
    </div>

    <div id="consultar" class="modulo">
        <button onclick="volver()" class="btn btn-gray">⬅ Volver</button>
        <h2>Mis Tickets</h2>
        <div id="lista-tickets"></div>
    </div>
</div>

<div id="modalEquipo" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0;">Registrar nuevo equipo</h2>
        <hr>
        <div class="grid-modal">
            <input type="text" id="n_pc" placeholder="PC">
            <select id="n_tipo"><option value="">Seleccione Tipo</option><option>Portátil</option><option>AIO</option><option>Torre</option></select>
            <input type="text" id="n_mod" placeholder="Modelo">
            <input type="text" id="n_inv" placeholder="Inventario">
            <select id="n_so"><option value="">Seleccione So</option><option>Windows 10</option><option>Windows 11</option></select>
            <input type="text" id="n_proc" placeholder="Procesador">
            <select id="n_ram"><option value="">Seleccione Ram</option><option>8GB</option><option>16GB</option></select>
            <input type="text" id="n_disco" placeholder="Disco">
            <input type="text" id="n_ip" placeholder="Ip">
            <input type="text" id="n_term" placeholder="Terminal">
            <input type="text" id="n_res" placeholder="Responsable">
            <select id="n_dep"><option value="">Seleccione Dependencia</option><option>Sistemas</option><option>Auditorio menor</option></select>
            <input type="text" id="n_correo" placeholder="Correo">
            <select id="n_campus"><option>Seleccione Campus</option><option>Bucaramanga</option></select>
            <select id="n_sede"><option>Seleccione Sede</option><option>Sede A</option><option>Sede D</option></select>
            <input type="text" id="n_ext" placeholder="Extensión">
            <input type="date" id="n_fecha">
        </div>
        <div style="margin-top:20px; text-align:right;">
            <button class="btn btn-blue" onclick="guardar()"><i class="fas fa-save"></i> Guardar</button>
            <button class="btn btn-gray" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // FIREBASE
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentColl = ""; 
    let localData = [];

    // AUTH
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u){ document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block'; } });

    // NAVEGACIÓN
    function abrir(id) {
        document.getElementById('panel-principal').style.display='none';
        document.querySelectorAll('.modulo').forEach(m => m.style.display='none');
        
        if(id === 'inv_admin' || id === 'inv_salas') {
            document.getElementById('modulo_inv').style.display='block';
            currentColl = (id === 'inv_admin') ? "inventario" : "inventario_salas";
            document.getElementById('titulo_inv').innerText = (id === 'inv_admin') ? "Inventario de equipos TIC" : "Inventario de equipos TIC (Salas)";
            cargarDatos();
        } else {
            document.getElementById(id).style.display='block';
        }
    }

    function volver() { 
        document.getElementById('panel-principal').style.display='grid'; 
        document.querySelectorAll('.modulo').forEach(m => m.style.display='none'); 
    }

    function abrirModal() { document.getElementById('modalEquipo').style.display='block'; }
    function cerrarModal() { document.getElementById('modalEquipo').style.display='none'; }

    // LÓGICA DATOS
    function cargarDatos() {
        db.collection(currentColl).onSnapshot(snap => {
            localData = [];
            snap.forEach(doc => localData.push({id: doc.id, ...doc.data()}));
            filtrar();
        });
    }

    function filtrar() {
        const ft = f_tipo.value.toLowerCase();
        const fm = f_mod.value.toLowerCase();
        const fi = f_inv.value.toLowerCase();
        const res = localData.filter(e => (e.tipo||"").toLowerCase().includes(ft) && (e.modelo||"").toLowerCase().includes(fm) && (e.inv||"").toLowerCase().includes(fi));
        
        document.getElementById('resumen_conteo').innerText = `Equipos encontrados con los filtros aplicados: **${res.length}**`;
        const tbody = document.getElementById('tablaData');
        tbody.innerHTML = "";
        res.forEach(e => {
            tbody.innerHTML += `<tr>
                <td>${e.pc}</td><td>${e.tipo}</td><td>${e.modelo}</td><td>${e.inv}</td><td>${e.res}</td><td>${e.dep}</td><td>Bucaramanga</td><td>Sede A</td>
                <td>
                    <button class="btn-acc bg-edit"><i class="fas fa-edit"></i></button>
                    <button class="btn-acc bg-tools"><i class="fas fa-tools"></i></button>
                    <button class="btn-acc bg-copy"><i class="fas fa-copy"></i></button>
                    <button class="btn-acc bg-view"><i class="fas fa-eye"></i></button>
                    <button class="btn-acc bg-delete" onclick="eliminar('${e.id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }

    async function guardar() {
        await db.collection(currentColl).add({
            pc: n_pc.value, tipo: n_tipo.value, modelo: n_mod.value, inv: n_inv.value, res: n_res.value, dep: n_dep.value, fecha: n_fecha.value
        });
        cerrarModal();
        alert("Equipo Registrado");
    }

    async function eliminar(id) {
        if(confirm("¿Seguro que desea eliminar este equipo?")) await db.collection(currentColl).doc(id).delete();
    }

    function limpiarFiltros() {
        document.querySelectorAll('.grid-filtros input, .grid-filtros select').forEach(i => i.value = "");
        filtrar();
    }
</script>
</body>
</html>
