<!DOCTYPE html>
<html>
<head>
  <title>Tickets PRO - Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <style>
    body { font-family: Arial; background:#f5f7fa; margin:0; padding:0; }
    header { background:#4285F4; color:white; padding:15px; font-size:24px; text-align:center; position:relative; }
    .tabs { display:flex; background:#e0e0e0; justify-content:center; }
    .tabs button { padding:12px 25px; border:none; background:none; cursor:pointer; font-size:16px; transition:0.3s; }
    .tabs button.active { background:#4285F4; color:white; border-radius:6px 6px 0 0; }
    .modulo { display:none; padding:20px; }
    .card { background:white; border-radius:12px; padding:15px; margin:15px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .badge { padding:4px 10px; border-radius:6px; color:white; font-weight:bold; }
    .badge.baja { background:#4CAF50; }
    .badge.media { background:#FF9800; }
    .badge.alta { background:#F44336; }
    button { cursor:pointer; margin:5px 0; padding:8px 12px; border:none; border-radius:6px; }
    #logoutBtn { position:absolute; top:15px; right:15px; background:#F44336; color:white; }
    input, select { padding:8px; margin:5px 0; width:100%; box-sizing:border-box; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    table, th, td { border:1px solid #ccc; border-radius:6px; }
    th { background:#4285F4; color:white; }
    td button { padding:4px 8px; margin:2px; font-size:12px; }
    #modalReasignar { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    #modalReasignar .card { width:300px; padding:20px; }
  </style>
</head>
<body>

<header>🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<!-- LOGIN -->
<div id="loginDiv" style="padding:20px; text-align:center;">
  <button id="loginBtn" style="padding:12px 25px; background:#4285F4; color:white; border:none; border-radius:6px; font-size:16px;">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <!-- TABS -->
  <div class="tabs">
    <button class="tabBtn active" onclick="mostrarModulo('crearTicket', this)">Crear Ticket</button>
    <button class="tabBtn" onclick="mostrarModulo('listaTickets', this)">Lista de Tickets</button>
    <button class="tabBtn" onclick="mostrarModulo('usuariosSection', this)">Gestión de Usuarios</button>
  </div>

  <!-- Crear Ticket -->
  <div id="crearTicket" class="modulo" style="display:block;">
    <div class="card">
      <h3>Crear Ticket</h3>
      <input id="titulo" placeholder="Título">
      <input id="desc" placeholder="Descripción">
      <select id="prioridad">
        <option>baja</option>
        <option>media</option>
        <option>alta</option>
      </select>
      <input type="file" id="file">
      <button onclick="crearTicket()">Enviar Ticket</button>
    </div>
  </div>

  <!-- Lista Tickets -->
  <div id="listaTickets" class="modulo">
    <div id="lista"></div>
  </div>

  <!-- Gestión de Usuarios -->
  <div id="usuariosSection" class="modulo">
    <div class="card">
      <h3>Gestión de Usuarios (Solo Admin)</h3>
      <input id="nuevoEmail" placeholder="Email usuario">
      <input id="nuevoNombre" placeholder="Nombre usuario">
      <select id="nuevoRol">
        <option value="usuario">Usuario</option>
        <option value="gestor">Gestor</option>
        <option value="admin">Admin</option>
      </select>
      <button onclick="agregarUsuario()">Agregar Usuario</button>

      <h4>Usuarios Registrados:</h4>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Nombre</th>
            <th>Rol</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Reasignar -->
<div id="modalReasignar">
  <div class="card">
    <h3>Reasignar Ticket</h3>
    <select id="selectGestor"></select>
    <button onclick="confirmarReasignar()">Aceptar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
  authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
  projectId: "sistema-de-tickets-ti-b12f5",
  storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
  messagingSenderId: "356054718850",
  appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();
let currentUser, currentRole;
let ticketReasignar = null;

// LOGIN
document.getElementById("loginBtn").addEventListener("click", ()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
});

auth.onAuthStateChanged(async user=>{
  if(!user) return;
  currentUser=user;

  document.getElementById("loginDiv").style.display="none";
  document.getElementById("dashboard").style.display="block";

  const roleRef=db.collection("roles").doc(user.email);
  let doc=await roleRef.get();

  if(user.email==="camicarmona1212@gmail.com"){
    await roleRef.set({ rol:"admin", nombre:"Cami Carmona" });
    doc=await roleRef.get();
  }

  if(!doc.exists){
    await roleRef.set({ rol:"usuario", nombre:user.displayName||user.email });
    doc=await roleRef.get();
  }

  currentRole=doc.data().rol;

  // Mostrar módulos según rol
  document.querySelectorAll(".tabBtn").forEach(btn=>{
    if(btn.textContent==="Gestión de Usuarios"){
      btn.style.display=currentRole==="admin"?"inline-block":"none";
    }
  });
  document.getElementById("usuariosSection").style.display=currentRole==="admin"?"block":"none";

  cargarUsuarios();
  cargarTickets();
});

// MODULOS
function mostrarModulo(id, btn){
  if(currentRole!=="admin" && id==="usuariosSection"){ alert("No tienes permiso"); return; }
  document.querySelectorAll(".modulo").forEach(m=>m.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

// TICKETS
async function crearTicket(){
  let url="";
  const f=document.getElementById("file").files[0];
  if(f){ const ref=storage.ref("tickets/"+Date.now()); await ref.put(f); url=await ref.getDownloadURL(); }
  await db.collection("tickets").add({
    titulo:document.getElementById("titulo").value,
    descripcion:document.getElementById("desc").value,
    estado:"abierto",
    prioridad:document.getElementById("prioridad").value,
    usuario:currentUser.email,
    gestor:"",
    adjunto:url,
    fecha:new Date(),
    historial:[]
  });
  alert("Ticket creado");
}

function accionesTicket(id,t){
  let b="";
  if(currentRole==="gestor"||currentRole==="admin"){
    b+=`<button onclick="asignarTicket('${id}')">Asignarme</button>`;
    b+=`<button onclick="cambiarEstado('${id}','proceso')">Proceso</button>`;
    b+=`<button onclick="cambiarEstado('${id}','cerrado')">Cerrar</button>`;
  }
  if(currentRole==="admin"){
    b+=`<button onclick="eliminarTicket('${id}')" style="background:red;color:white;">Eliminar</button>`;
    b+=`<button onclick="abrirModal('${id}')">Reasignar</button>`;
  }
  return b;
}

async function asignarTicket(id){ await actualizarTicket(id,{gestor:currentUser.email},"Asignado"); }
async function cambiarEstado(id,estado){ await actualizarTicket(id,{estado},`Cambio estado a ${estado}`); }

async function actualizarTicket(id,cambios,accion){
  const docRef=db.collection("tickets").doc(id);
  const doc=await docRef.get();
  const historial=doc.data().historial||[];
  historial.push({accion,usuario:currentUser.email,fecha:new Date()});
  await docRef.update({...cambios,historial});
}

async function cargarTickets(){
  let query=db.collection("tickets");
  if(currentRole==="usuario") query=query.where("usuario","==",currentUser.email);
  if(currentRole==="gestor") query=query.where("gestor","in":["",currentUser.email]);
  query.onSnapshot(snapshot=>{
    const lista=document.getElementById("lista");
    lista.innerHTML="";
    snapshot.docs.forEach(doc=>{
      const t=doc.data();
      const color=t.prioridad==="alta"?"#F44336":t.prioridad==="media"?"#FF9800":"#4CAF50";
      const div=document.createElement("div");
      div.className="card";
      div.style.borderLeft=`6px solid ${color}`;
      const gestorNombre = t.gestor ? t.gestor : "Sin asignar";
      div.innerHTML=`
        <b>${t.titulo}</b> <span class="badge ${t.prioridad}">${t.prioridad}</span><br>
        ${t.descripcion}<br>
        Estado: <b>${t.estado}</b><br>
        Gestor: ${gestorNombre}<br>
        ${t.adjunto?`<a href="${t.adjunto}" target="_blank">Ver archivo</a>`:""}<br>
        ${accionesTicket(doc.id,t)}
      `;
      lista.prepend(div);
    });
  });
}

// USUARIOS
async function agregarUsuario(){
  if(currentRole!=="admin"){ alert("Solo admin"); return; }
  const email=document.getElementById("nuevoEmail").value.trim();
  const nombre=document.getElementById("nuevoNombre").value.trim();
  const rol=document.getElementById("nuevoRol").value;
  if(!email||!nombre){ alert("Ingresa email y nombre"); return; }
  await db.collection("roles").doc(email).set({ rol, nombre });
  document.getElementById("nuevoEmail").value="";
  document.getElementById("nuevoNombre").value="";
  cargarUsuarios();
}

async function cargarUsuarios(){
  if(currentRole!=="admin") return;
  const tabla=document.getElementById("tablaUsuarios");
  tabla.innerHTML="";
  const snap=await db.collection("roles").get();
  snap.forEach(doc=>{
    const email=doc.id;
    const data=doc.data();
    const tr=document.createElement("tr");
    tr.innerHTML=`
      <td>${email}</td>
      <td>${data.nombre}</td>
      <td>
        <select>
          <option value="usuario" ${data.rol==="usuario"?"selected":""}>Usuario</option>
          <option value="gestor" ${data.rol==="gestor"?"selected":""}>Gestor</option>
          <option value="admin" ${data.rol==="admin"?"selected":""}>Admin</option>
        </select>
      </td>
      <td>
        <button style="background:#4CAF50;color:white;" onclick="actualizarRol('${email}',this)">Actualizar</button>
        <button style="background:red;color:white;" onclick="eliminarUsuario('${email}')">Eliminar</button>
      </td>
    `;
    tabla.appendChild(tr);
  });
}

async function actualizarRol(email,btn){
  const select=btn.parentElement.parentElement.querySelector("select");
  await db.collection("roles").doc(email).set({ rol:select.value });
  alert("Rol actualizado");
  cargarUsuarios();
}

async function eliminarUsuario(email){
  if(!confirm("Eliminar usuario?")) return;
  await db.collection("roles").doc(email).delete();
  alert("Usuario eliminado");
  cargarUsuarios();
}

// REASIGNAR
async function abrirModal(ticketId){
  ticketReasignar=ticketId;
  const select=document.getElementById("selectGestor");
  select.innerHTML="";
  const snap=await db.collection("roles").where("rol","==","gestor").get();
  snap.forEach(doc=>{
    const opt=document.createElement("option");
    opt.value=doc.id;
    opt.text=doc.data().nombre;
    select.appendChild(opt);
  });
  document.getElementById("modalReasignar").style.display="flex";
}

async function confirmarReasignar(){
  if(!ticketReasignar) return;
  const select=document.getElementById("selectGestor");
  const gestorEmail=select.value;
  const docRef=db.collection("tickets").doc(ticketReasignar);
  const doc=await docRef.get();
  const historial=doc.data().historial||[];
  historial.push({accion:"Reasignado a "+select.options[select.selectedIndex].text,usuario:currentUser.email,fecha:new Date()});
  await docRef.update({gestor:gestorEmail,historial});
  ticketReasignar=null;
  cerrarModal();
}

function cerrarModal(){ document.getElementById("modalReasignar").style.display="none"; }

// ELIMINAR TICKET
async function eliminarTicket(id){ if(!confirm("Eliminar ticket?")) return; await db.collection("tickets").doc(id).delete(); alert("Ticket eliminado"); }

// CERRAR SESION
function cerrarSesion(){ auth.signOut().then(()=>{ currentUser=null; currentRole=null; document.getElementById("dashboard").style.display="none"; document.getElementById("loginDiv").style.display="block"; }); }
</script>
</body>
</html>
