<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TIC UNICIENCIA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --dark: #0f172a; --bg: #f1f5f9; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --gray: #64748b; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        #login { display: none; height: 90vh; justify-content: center; align-items: center; }
        #dashboard { display: none; padding: 20px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; display: none; }
        .card:hover { transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card i { font-size: 30px; color: var(--primary); margin-bottom: 10px; }
        .stat-box { background: white; border-radius: 10px; padding: 10px; min-width: 120px; text-align: center; border: 2px solid #ddd; cursor: pointer; }
        .stat-box.abierto { border-color: var(--success); color: var(--success); }
        .stat-box.proceso { border-color: var(--warning); color: var(--warning); }
        .stat-box.cerrado { border-color: var(--danger); color: var(--danger); }
        .stat-box span { font-weight: bold; font-size: 20px; display: block; }
        .modulo { display: none; background: white; padding: 25px; border-radius: 15px; min-height: 500px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .btn-agregar-master { background: linear-gradient(135deg, #2563eb, #1e40af); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; text-transform: uppercase; font-size: 0.75rem; }
        .btn-acc { width: 30px; height: 30px; border-radius: 6px; border: none; color: white; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin-right: 3px; font-size: 0.85rem; }
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
        .modal-content { background: white; margin: 1% auto; padding: 20px; width: 90%; max-width: 850px; border-radius: 12px; position: relative; max-height: 95vh; overflow-y: auto; }
        .grid-form { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .campo-group { display: flex; flex-direction: column; gap: 3px; }
        .campo-group label { font-weight: 700; font-size: 0.65rem; color: var(--gray); text-transform: uppercase; }
        .campo-group input, .campo-group select, .campo-group textarea { padding: 8px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; font-size: 0.7rem; background: #f8fafc; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; }
        .search-container-adv { background: #f8fafc; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    </style>
</head>
<body>
<header><strong>SISTEMA TIC - UNICIENCIA</strong><div style="display:flex;align-items:center;gap:15px;"><span id="user_info"></span><button onclick="logout()" style="background:var(--danger);color:white;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;">Salir</button></div></header>
<div id="login"><div style="text-align:center;background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);"><i class="fas fa-lock fa-3x" style="color:var(--primary);"></i><h2>Acceso Portal</h2><button class="btn-agregar-master" onclick="login()"><i class="fab fa-google"></i> Google Login</button></div></div>
<div id="dashboard">
    <div class="container-stats-header" id="stats_contadores_visibles" style="display:none;"><div class="stat-box abierto" onclick="abrir('mod_admin_tickets')"><small>Abiertos</small><span id="count_abiertos">0</span></div><div class="stat-box proceso" onclick="abrir('mod_admin_tickets')"><small>En Proceso</small><span id="count_proceso">0</span></div><div class="stat-box cerrado" onclick="abrir('mod_tickets_cerrados')"><small>Cerrados</small><span id="count_cerrados">0</span></div></div>
    <div id="panel-principal" class="grid-main">
        <div class="card" id="card_mis_tickets" onclick="abrir('mod_mis_tickets')"><i class="fas fa-ticket-alt"></i><h3>Mis Tickets</h3></div>
        <div class="card" id="card_enviar_ticket" onclick="abrir('mod_enviar_ticket')"><i class="fas fa-paper-plane"></i><h3>Enviar Ticket</h3></div>
        <div class="card" id="card_admin_tickets" onclick="abrir('mod_admin_tickets')"><i class="fas fa-tasks"></i><h3>Admin Tickets</h3></div>
        <div class="card" id="card_inv_admin" onclick="abrir_maestro('inventario', 'Equipos Administrativos')"><i class="fas fa-laptop"></i><h3>Equipos Administrativos</h3></div>
        <div class="card" id="card_inv_salas" onclick="abrir_maestro('inventario_salas', 'Equipos Salas')"><i class="fas fa-desktop"></i><h3>Equipos Salas</h3></div>
        <div class="card" id="card_calendario" onclick="abrir('mod_calendario')"><i class="fas fa-calendar-alt"></i><h3>Calendario</h3></div>
        <div class="card" id="card_stats" onclick="abrir('mod_stats')"><i class="fas fa-chart-pie"></i><h3>Estadísticas</h3></div>
    </div>

    <div id="mod_maestro" class="modulo">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;"><button onclick="volver()" class="btn-gray">⬅ Volver</button><h2 id="m_titulo"></h2><button class="btn-agregar-master" onclick="abrirModalRegistro('nuevo')">Nuevo Registro</button></div>
        <div class="search-container-adv">
            <input type="text" id="f_serial" placeholder="Filtrar por Serial" onkeyup="filtrarMaestro()">
            <input type="text" id="f_marca" placeholder="Filtrar por Marca" onkeyup="filtrarMaestro()">
            <input type="text" id="f_nombre" placeholder="Filtrar por Nombre" onkeyup="filtrarMaestro()">
        </div>
        <div style="overflow-x:auto;"><table><thead id="m_thead"></thead><tbody id="m_tbody"></tbody></table></div>
    </div>

    <div id="mod_calendario" class="modulo"><button onclick="volver()">⬅ Volver</button><div id="calendar" style="margin-top:15px;"></div></div>
    
    <div id="mod_enviar_ticket" class="modulo"><button onclick="volver()">⬅ Volver</button><div style="max-width:500px;margin:auto;"><h2 style="text-align:center;">Solicitud Soporte</h2><div class="grid-form" style="grid-template-columns:1fr;"><input type="text" id="tk_nom_user" placeholder="Nombre..."><select id="tk_campus"><option value="Bucaramanga">Bucaramanga (BGA)</option><option value="Bogotá">Bogotá (BOG)</option><option value="Tunja">Tunja (TUN)</option></select><select id="tk_dep"><option>Administrativa</option><option>Docente</option><option>Secretaría</option></select><textarea id="tk_desc" rows="4" placeholder="Problema..."></textarea><button class="btn-agregar-master" onclick="enviarTicket()">Enviar</button></div></div></div>
</div>

<div id="modalRegistro" class="modal"><div class="modal-content"><h3 id="modal_tit">Formulario Equipo</h3><div id="form_dinamico" class="grid-form"></div><div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;"><button onclick="cerrarModales()" style="padding:10px;cursor:pointer;background:#eee;border:none;border-radius:5px;">Cerrar</button><button class="btn-agregar-master" onclick="guardarDatoMaestro()">Guardar Cambios</button></div></div></div>
<div id="modalMantenimiento" class="modal"><div class="modal-content" style="max-width:400px;"><h3>Registrar Mantenimiento</h3><div class="grid-form" style="grid-template-columns:1fr;"><input type="date" id="mnt_fecha"><select id="mnt_tipo"><option>Preventivo</option><option>Correctivo</option></select><textarea id="mnt_desc" rows="3" placeholder="Detalle..."></textarea><div style="display:flex;gap:10px;"><button class="btn-agregar-master" onclick="guardarMantenimiento()" style="flex:1;">Guardar</button><button onclick="cerrarModales()" style="flex:1;cursor:pointer;">Cerrar</button></div></div></div></div>
<div id="modalVerEvento" class="modal"><div class="modal-content" style="max-width:400px;"><h3>Detalle Mantenimiento</h3><div id="det_evento_body"></div><button onclick="cerrarModales()" style="margin-top:15px;width:100%;padding:10px;cursor:pointer;">Cerrar</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(); const auth = firebase.auth();
    let user, userRole, currentColl, localData = [], selectedId, modoModal = "nuevo", calendar;

    const camposEquipo = [
        ["Nombre","nom"],["Serial","ser"],["Marca","mar"],["Sede","sed"],
        ["Campus","campus_eq","select",["Bucaramanga","Bogotá","Tunja"]],
        ["IP","ip"],["Máscara","mask"],["Enlace","gate"],
        ["Procesador","proc"],["RAM","ram"],["Disco","disk"],
        ["S.O","so"],["Office","off"],["Antivirus","antiv"],["Dependencia","dep_eq"]
    ];

    auth.onAuthStateChanged(async (u) => {
        if(u) {
            user = u; document.getElementById('login').style.display = 'none'; document.getElementById('dashboard').style.display = 'block';
            await verificarRol(); observarContadores();
        } else { document.getElementById('login').style.display = 'flex'; document.getElementById('dashboard').style.display = 'none'; }
    });

    async function verificarRol() {
        const q = await db.collection("usuarios").where("cor", "==", user.email).get();
        userRole = !q.empty ? q.docs[0].data().rol : (user.email === "camicarmona1212@gmail.com" ? "Admin" : "Usuario");
        document.getElementById('user_info').innerText = `${user.email} (${userRole})`;
        document.querySelectorAll('.card').forEach(el => { if(el.id !== 'card_usuarios') el.style.display='block'; });
        if(userRole === 'Admin') document.getElementById('stats_contadores_visibles').style.display = 'flex';
    }

    function abrir(id, mColl = null, mTit = null) {
        document.getElementById('panel-principal').style.display = 'none'; document.querySelectorAll('.modulo').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(mColl) { currentColl = mColl; document.getElementById('m_titulo').innerText = mTit; db.collection(currentColl).onSnapshot(s => { localData = []; s.forEach(d => localData.push({id: d.id, ...d.data()})); renderTablaMaestra(); }); }
        if(id === 'mod_calendario') setTimeout(initCalendar, 200);
    }

    function renderTablaMaestra(dataFiltrada = null) {
        const b = document.getElementById('m_tbody'); b.innerHTML = ""; const h = document.getElementById('m_thead');
        const displayData = dataFiltrada || localData;
        h.innerHTML = `<tr><th>Nombre/Equipo</th><th>Serial</th><th>Marca</th><th>Sede</th><th>Acciones</th></tr>`;
        displayData.forEach(e => {
            b.innerHTML += `<tr><td>${e.nom}</td><td>${e.ser}</td><td>${e.mar}</td><td>${e.sed}</td><td>
                <button class="btn-acc bg-info-e" onclick="abrirModalRegistro('editar','${e.id}')"><i class="fas fa-edit"></i></button>
                <button class="btn-acc bg-r-purple" onclick="abrirMantenimiento('${e.id}')"><i class="fas fa-tools"></i></button>
                <button class="btn-acc bg-p-orange" onclick="duplicarEquipo('${e.id}')"><i class="fas fa-copy"></i></button>
                ${userRole==='Admin' ? `<button class="btn-acc bg-d-red" onclick="eliminar('${e.id}')"><i class="fas fa-trash"></i></button>` : ''}
            </td></tr>`;
        });
    }

    function abrirModalRegistro(modo, id = null) {
        modoModal = modo; selectedId = id; const f = document.getElementById('form_dinamico'); f.innerHTML = "";
        camposEquipo.forEach(x => {
            let inp = x[2]==="select" ? `<select id="${x[1]}">${x[3].map(o=>`<option value="${o}">${o}</option>`).join('')}</select>` : `<input type="text" id="${x[1]}">`;
            f.innerHTML += `<div class="campo-group"><label>${x[0]}</label>${inp}</div>`;
        });
        if(modo==='editar') { const d = localData.find(x=>x.id===id); setTimeout(()=>Object.keys(d).forEach(k=>{if(document.getElementById(k)) document.getElementById(k).value=d[k]}),50); }
        document.getElementById('modalRegistro').style.display='block';
    }

    async function guardarMantenimiento() {
        const d = { fecha: mnt_fecha.value, tipo: mnt_tipo.value, desc: mnt_desc.value };
        const eq = localData.find(x => x.id === selectedId);
        // Guardar mantenimiento con datos del equipo para el calendario
        await db.collection("mantenimientos_global").add({
            ...d, equipoId: selectedId, 
            nombreEq: eq.nom, 
            dep: eq.dep_eq || "General", 
            campus: eq.campus_eq || "Bucaramanga"
        });
        cerrarModales(); alert("Mantenimiento Registrado");
    }

    function initCalendar() {
        const el = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(el, {
            initialView: 'dayGridMonth', locale: 'es',
            events: async function(info, success) {
                const snap = await db.collection("mantenimientos_global").get();
                const evs = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    const sigla = d.campus === "Bucaramanga" ? "BGA" : (d.campus === "Bogotá" ? "BOG" : "TUN");
                    evs.push({
                        title: `[${sigla}] ${d.nombreEq} - ${d.dep}`,
                        start: d.fecha,
                        extendedProps: d,
                        backgroundColor: d.tipo === 'Correctivo' ? '#ef4444' : '#22c55e'
                    });
                });
                success(evs);
            },
            eventClick: (info) => {
                const d = info.event.extendedProps;
                document.getElementById('det_evento_body').innerHTML = `<b>Fecha:</b> ${d.fecha}<br><b>Tipo:</b> ${d.tipo}<br><b>Equipo:</b> ${d.nombreEq}<br><b>Dependencia:</b> ${d.dep}<br><b>Campus:</b> ${d.campus}<br><b>Descripción:</b> ${d.desc}`;
                document.getElementById('modalVerEvento').style.display='block';
            }
        });
        calendar.render();
    }

    function filtrarMaestro() {
        const s = document.getElementById('f_serial').value.toLowerCase();
        const m = document.getElementById('f_marca').value.toLowerCase();
        const n = document.getElementById('f_nombre').value.toLowerCase();
        renderTablaMaestra(localData.filter(e => (e.ser||"").toLowerCase().includes(s) && (e.mar||"").toLowerCase().includes(m) && (e.nom||"").toLowerCase().includes(n)));
    }

    async function guardarDatoMaestro() { let o = {}; document.querySelectorAll('#form_dinamico input, #form_dinamico select').forEach(i => o[i.id] = i.value); if(modoModal === 'editar') await db.collection(currentColl).doc(selectedId).update(o); else await db.collection(currentColl).add(o); cerrarModales(); }
    function duplicarEquipo(id) { const o = localData.find(x => x.id === id); abrirModalRegistro('nuevo'); setTimeout(() => { Object.keys(o).forEach(k => { if(document.getElementById(k) && k !== 'id') document.getElementById(k).value = o[k]; }); }, 100); }
    function abrirMantenimiento(id) { selectedId = id; document.getElementById('mnt_fecha').value = new Date().toISOString().split('T')[0]; document.getElementById('modalMantenimiento').style.display='block'; }
    function observarContadores() { db.collection("tickets").onSnapshot(snap => { let ab = 0, pr = 0, ce = 0; snap.forEach(doc => { const s = doc.data().estado; if(s === "Abierto") ab++; else if(s === "En Proceso") pr++; else if(s === "Cerrado") ce++; }); document.getElementById('count_abiertos').innerText = ab; document.getElementById('count_proceso').innerText = pr; document.getElementById('count_cerrados').innerText = ce; }); }
    function volver() { document.getElementById('panel-principal').style.display = 'grid'; document.querySelectorAll('.modulo').forEach(m => m.style.display = 'none'); }
    function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
    function logout() { auth.signOut().then(() => location.reload()); }
    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function abrir_maestro(c, t) { abrir('mod_maestro', c, t); }
</script>
</body>
</html>
