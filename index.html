<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets PRO - Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; padding: 0; }
    header { background: #1e88a8; color: white; padding: 15px; font-size: 24px; text-align: center; position: relative; }
    .tabs { display: flex; background: #e0e0e0; justify-content: center; margin-top: 20px; }
    .tabs button { padding: 12px 25px; border: none; background: none; cursor: pointer; font-size: 16px; transition: 0.3s; }
    .tabs button.active { background: #1e88a8; color: white; border-radius: 6px 6px 0 0; }
    .cardDash { width: 250px; background: white; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); margin: 10px; }
    .cardDash:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); }
    .cardDash .icon { font-size: 40px; color: #1e88a8; margin-bottom: 10px; }
    .cardDash h3 { font-size: 18px; color: #1e88a8; margin-top: 10px; }
    .cardDash p { font-size: 14px; color: #333; }
    #toast { visibility: hidden; min-width: 250px; background: #333; color: white; text-align: center; border-radius: 6px; padding: 16px; position: fixed; z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%); }
    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
    @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    .modulo { display: none; padding: 20px; }
    .modulo .card { margin: 10px 0; }
    .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0, 0, 0, 0.5); }
    .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 8px; width: 300px; text-align: center; }
    .modal-content select, .modal-content button { width: 90%; margin: 5px 0; }
  </style>
</head>
<body>

<header>🎫 Tickets PRO
  <button id="logoutBtn" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<!-- LOGIN -->
<div id="loginDiv" style="padding: 20px; text-align: center;">
  <button id="loginBtn" style="padding: 12px 25px; background: #1e88a8; color: white; border: none; border-radius: 6px; font-size: 16px;">Iniciar sesión con Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none; padding: 20px;">

  <h1 style="color:#1e88a8; border-left:6px solid #1e88a8; padding-left:10px;">
    Panel de Control
  </h1>

  <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">

    <!-- CONSULTAR TICKETS -->
    <div class="cardDash" onclick="mostrarModulo('listaTickets')">
      <div class="icon">🔍</div>
      <h3>Consultar Tickets</h3>
      <p>Ver el estado de tus tickets.</p>
    </div>

    <!-- CREAR TICKET -->
    <div class="cardDash" onclick="mostrarModulo('crearTicket')">
      <div class="icon">📩</div>
      <h3>Enviar un Ticket</h3>
      <p>Reportar un problema o solicitud.</p>
    </div>

    <!-- ADMIN TICKETS -->
    <div class="cardDash" onclick="mostrarModulo('adminTickets')">
      <div class="icon">🛠️</div>
      <h3>Administrar Tickets</h3>
      <p>Gestionar los tickets del sistema.</p>
    </div>

    <!-- GESTION USUARIOS -->
    <div class="cardDash" id="btnUsuarios" onclick="mostrarModulo('usuariosSection')">
      <div class="icon">📦</div>
      <h3>Gestión de Usuarios</h3>
      <p>Administrar usuarios del sistema.</p>
    </div>

  </div>

  <!-- CONTENIDO MODULOS -->
  <div id="crearTicket" class="modulo"></div>
  <div id="listaTickets" class="modulo"></div>
  <div id="adminTickets" class="modulo"></div>
  <div id="usuariosSection" class="modulo"></div>

</div>

<!-- Modal Reasignar Ticket -->
<div id="modalReasignar" class="modal">
  <div class="modal-content">
    <h3>Reasignar Ticket</h3>
    <select id="selectGestor"></select>
    <button onclick="confirmarReasignacion()">Aceptar</button>
    <button onclick="cancelarReasignacion()">Cancelar</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw",
    authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com",
    projectId: "sistema-de-tickets-ti-b12f5",
    storageBucket: "sistema-de-tickets-ti-b12f5.appspot.com",
    messagingSenderId: "356054718850",
    appId: "1:356054718850:web:3a439d4ffbd4f017a7179b"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();
  let currentUser, currentRole, ticketAReasignar = null;

  const showToast = (msg) => { 
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.className = "show";
    setTimeout(() => { toast.className = ""; }, 3000);
  };

  // LOGIN
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  });

  auth.onAuthStateChanged(async (user) => {
    if (!user) return;
    currentUser = user;
    document.getElementById("loginDiv").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    const roleRef = db.collection("roles").doc(user.email);
    let doc = await roleRef.get();
    if (user.email === "camicarmona1212@gmail.com") {
      await roleRef.set({ rol: "Admin", nombre: "Cami Carmona" });
      doc = await roleRef.get();
    }
    if (!doc.exists) {
      await roleRef.set({ rol: "Usuario", nombre: user.displayName });
      doc = await roleRef.get();
    }
    currentRole = doc.data().rol;

    // Ocultar el botón de gestión de usuarios si no es admin
    document.querySelectorAll(".tabBtn").forEach(btn => {
      if (btn.textContent === "Gestión de Usuarios") {
        btn.style.display = currentRole === "Admin" ? "inline-block" : "none";
      }
    });

    document.getElementById("usuariosSection").style.display = currentRole === "Admin" ? "block" : "none";
    cargarUsuarios();
    cargarTickets();
  });

  function mostrarModulo(id) {
    document.querySelectorAll(".modulo").forEach(m => m.style.display = "none");
    const modulo = document.getElementById(id);
    if (modulo) {
      modulo.style.display = "block";
    }

    // Permisos
    if (currentRole !== "Admin" && id === "usuariosSection") {
      alert("No tienes permiso");
      return;
    }
  }

  // ================= TICKETS =================
  async function crear() {
    let url = "";
    const f = file.files[0];
    if (f) { const ref = storage.ref("tickets/" + Date.now()); await ref.put(f); url = await ref.getDownloadURL(); }
    await db.collection("tickets").add({
      titulo: titulo.value,
      descripcion: desc.value,
      estado: "abierto",
      prioridad: prioridad.value,
      usuario: currentUser.email,
      gestor: "",
      adjunto: url,
      fecha: new Date(),
      historial: []
    });
    showToast("Ticket creado");
  }

  async function cargarTickets() {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";
    const snap = await db.collection("tickets").orderBy("fecha", "desc").get();
    snap.docs.forEach(doc => {
      const t = doc.data();
      if (currentRole === "Usuario" && t.usuario !== currentUser.email) return;
      if (currentRole === "Gestor" && t.gestor !== currentUser.email) return;
      let color = t.prioridad === "alta" ? "#F44336" : t.prioridad === "media" ? "#FF9800" : "#4CAF50";
      const div = document.createElement("div");
      div.className = "card";
      div.style.borderLeft = `6px solid ${color}`;
      div.innerHTML = `
        <b>${t.titulo}</b> <span class="badge ${t.prioridad}">${t.prioridad}</span><br>
        ${t.descripcion}<br>
        Estado: <b>${t.estado}</b><br>
        Gestor: ${t.gestor || "Sin asignar"}<br>
        ${t.adjunto ? `<a href="${t.adjunto}" target="_blank">Ver archivo</a>` : ""}<br>
        ${acciones(doc.id, t)}
        <input id="c-${doc.id}" placeholder="Comentario">
        <button onclick="comentar('${doc.id}')">Enviar</button>
      `;
      lista.appendChild(div);
    });
  }

  function acciones(id, t) {
    let b = "";
    if (currentRole === "Gestor" || currentRole === "Admin") {
      b += `<button onclick="asignar('${id}')">Asignarme</button>`;
      b += `<button onclick="estado('${id}','proceso')">Proceso</button>`;
      b += `<button onclick="estado('${id}','cerrado')">Cerrar</button>`;
    }
    if (currentRole === "Admin") {
      b += `<button onclick="eliminarTicket('${id}')" style="background:red;color:white;">Eliminar</button>`;
      b += `<button onclick="abrirModalReasignar('${id}')" style="background:#FFA500;color:white;">Reasignar</button>`;
    }
    return b;
  }

  function asignar(id) { actualizarTicket(id, { gestor: currentUser.email }, "Asignado"); }
  function estado(id, e) { actualizarTicket(id, { estado: e }, "Cambio de estado a " + e); }
  async function actualizarTicket(id, cambios, accion) {
    const docRef = db.collection("tickets").doc(id);
    const doc = await docRef.get();
    const historial = doc.data().historial || [];
    historial.push({ accion, usuario: currentUser.email, fecha: new Date() });
    await docRef.update({ ...cambios, historial });
    showToast("Ticket actualizado");
    cargarTickets();
  }

  function comentar(id) {
    const texto = document.getElementById("c-" + id).value;
    if (!texto) return;
    db.collection("tickets").doc(id).collection("comentarios").add({ texto, usuario: currentUser.email, fecha: new Date() });
    showToast("Comentario enviado");
  }

  async function eliminarTicket(id) {
    if (!confirm("Eliminar ticket?")) return;
    await db.collection("tickets").doc(id).delete();
    showToast("Ticket eliminado");
  }

  // ==================== USUARIOS ====================
  async function agregarUsuario() {
    if (currentRole !== "Admin") { alert("Solo Admin"); return; }
    const email = emailUser.value.trim();
    const nombre = nombreUser.value.trim();
    const rol = rolUser.value;
    if (!email || !nombre) { alert("Ingrese email y nombre"); return; }
    await db.collection("roles").doc(email).set({ nombre, rol });
    showToast("Usuario agregado");
    emailUser.value = ""; nombreUser.value = "";
    cargarUsuarios();
  }

  async function cargarUsuarios() {
    if (currentRole !== "Admin") return;
    const tabla = document.getElementById("tablaUsuarios");
    tabla.innerHTML = "";
    const snap = await db.collection("roles").get();
    snap.forEach(doc => {
      const data = doc.data();
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td contenteditable="true">${data.nombre}</td>
        <td contenteditable="true">${doc.id}</td>
        <td>
          <select>
            <option ${data.rol === "Usuario" ? "selected" : ""}>Usuario</option>
            <option ${data.rol === "Gestor" ? "selected" : ""}>Gestor</option>
            <option ${data.rol === "Admin" ? "selected" : ""}>Admin</option>
          </select>
        </td>
        <td>
          <button onclick="guardarFilaUsuario(this)">💾</button>
          <button style="background:#F44336;color:white;" onclick="eliminarUsuario('${doc.id}')">Eliminar</button>
        </td>
      `;
      tabla.appendChild(tr);
    });
  }

  async function guardarFilaUsuario(btn) {
    const tr = btn.parentElement.parentElement;
    const nombre = tr.children[0].innerText.trim();
    const email = tr.children[1].innerText.trim();
    const rol = tr.children[2].children[0].value;
    if (!nombre || !email) { alert("Nombre y email requeridos"); return; }
    await db.collection("roles").doc(email).set({ nombre, rol });
    showToast("Usuario actualizado");
    cargarUsuarios();
  }

  function eliminarUsuario(email) {
    if (!confirm("Eliminar usuario?")) return;
    db.collection("roles").doc(email).delete().then(() => cargarUsuarios());
  }

  // ================== REASIGNAR TICKET =================
  async function abrirModalReasignar(ticketId) {
    ticketAReasignar = ticketId;
    const select = document.getElementById("selectGestor");
    select.innerHTML = "";
    const snap = await db.collection("roles").where("rol", "==", "Gestor").get();
    snap.forEach(doc => {
      const option = document.createElement("option");
      option.value = doc.id;
      option.text = `${doc.data().nombre} (${doc.id})`;
      select.appendChild(option);
    });
    document.getElementById("modalReasignar").style.display = "block";
  }

  async function confirmarReasignacion() {
    const nuevoGestor = document.getElementById("selectGestor").value;
    if (!ticketAReasignar || !nuevoGestor) return;
    const docRef = db.collection("tickets").doc(ticketAReasignar);
    const doc = await docRef.get();
    const historial = doc.data().historial || [];
    historial.push({ accion: "Reasignado a " + nuevoGestor, usuario: currentUser.email, fecha: new Date() });
    await docRef.update({ gestor: nuevoGestor, historial });
    ticketAReasignar = null;
    document.getElementById("modalReasignar").style.display = "none";
    showToast("Ticket reasignado");
    cargarTickets();
  }

  function cancelarReasignacion() {
    ticketAReasignar = null;
    document.getElementById("modalReasignar").style.display = "none";
  }

  // ================== CERRAR SESION =================
  function cerrarSesion() {
