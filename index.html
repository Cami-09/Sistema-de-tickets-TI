<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema TIC Uniciencia - Gestión e Inventario</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #2563eb; --purple: #8b5cf6; --dark: #0f172a; --bg: #f1f5f9; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #334155; }
        header { background: var(--dark); color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; }

        /* DASHBOARD */
        #dashboard { display: none; padding: 25px; }
        .grid-main { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary); }
        .card i { font-size: 35px; color: var(--primary); margin-bottom: 12px; }

        .modulo { display: none; background: white; padding: 25px; border-radius: 12px; min-height: 500px; }
        .resumen-celeste { background: #e0f2fe; padding: 12px; border-radius: 8px; color: #0369a1; margin-bottom: 15px; text-align: center; font-weight: 500; }

        /* ESTILOS CALENDARIO (IGUAL A LA IMAGEN) */
        #calendar { max-width: 100%; margin: 0 auto; background: white; padding: 10px; }
        .fc-toolbar-title { text-transform: capitalize; font-size: 1.5rem !important; font-weight: bold !important; }
        .fc-button-primary { background-color: var(--purple) !important; border-color: var(--purple) !important; }
        .fc-daygrid-event { border: none !important; padding: 2px; }
        .fc-event-main { padding: 2px; font-size: 0.75rem; }
        .event-bga { background-color: #475569 !important; border-radius: 4px; padding: 3px; color: white; }
        .badge-bga { background: #f59e0b; color: black; padding: 1px 3px; border-radius: 3px; font-weight: bold; margin-right: 4px; font-size: 0.65rem; }

        /* TABLAS Y ACCIONES */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 15px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .btn-acc { width: 30px; height: 30px; border-radius: 4px; border: none; color: white; cursor: pointer; margin-right: 2px; }
        .bg-edit { background: #f59e0b; } .bg-tools { background: #2563eb; } .bg-copy { background: #06b6d4; } .bg-view { background: #00bcd4; } .bg-delete { background: #ef4444; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 85%; max-width: 850px; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
        .grid-modal { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        input, select, textarea { padding: 9px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #64748b; color: white; }
    </style>
</head>
<body>

<header>
    <strong>SISTEMA TIC - UNICIENCIA</strong>
    <button onclick="logout()" class="btn" style="background:#334155; color:white; padding:5px 12px;">Salir</button>
</header>

<div id="login" style="display:flex; height:80vh; justify-content:center; align-items:center;">
    <button class="btn btn-blue" onclick="login()">Ingresar con Google</button>
</div>

<div id="dashboard">
    <div id="panel-principal" class="grid-main">
        <div class="card" onclick="abrir('consultar')"><i class="fas fa-search"></i><h3>Tickets</h3></div>
        <div class="card" onclick="abrir('inv_admin')"><i class="fas fa-desktop"></i><h3>Equipos Administrativos</h3></div>
        <div class="card" onclick="abrir('inv_salas')"><i class="fas fa-laptop"></i><h3>Equipos de Salas</h3></div>
        <div class="card" onclick="abrir('mod_calendario')"><i class="fas fa-calendar-alt"></i><h3>Calendario</h3></div>
        <div class="card"><i class="fas fa-print"></i><h3>Impresoras</h3></div>
    </div>

    <div id="mod_calendario" class="modulo">
        <button onclick="volver()" class="btn btn-gray" style="margin-bottom: 15px;">⬅ Volver</button>
        <div style="text-align:center; margin-bottom: 20px;">
            <h2 style="display:inline-flex; align-items:center; gap:10px;">
                📅 Calendario de Mantenimientos
            </h2>
        </div>
        <div id="calendar"></div>
    </div>

    <div id="modulo_inv" class="modulo">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="volver()" class="btn btn-gray">⬅ Volver</button>
            <h2 id="titulo_inv" style="color:var(--primary); margin:0;"></h2>
            <button class="btn btn-blue" onclick="abrirModalRegistro()">+ Registrar nuevo equipo</button>
        </div>
        <div id="resumen_conteo" class="resumen-celeste" style="margin-top:15px;"></div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>PC</th><th>Tipo</th><th>Modelo</th><th>Inventario</th><th>Responsable</th><th>Dependencia</th><th>Acciones</th></tr></thead>
                <tbody id="tablaData"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalMante" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <h2>Registrar Mantenimiento</h2>
        <input type="date" id="m_fecha">
        <select id="m_tipo" style="margin:10px 0;"><option>Preventivo</option><option>Correctivo</option></select>
        <textarea id="m_desc" placeholder="Descripción..." rows="4"></textarea>
        <button class="btn btn-blue" style="width:100%; margin-top:15px;" onclick="guardarMantenimiento()">Registrar Mantenimiento</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDLucWQMOgeUx3e5H8AbFCml7AosZ2eVHw", authDomain: "sistema-de-tickets-ti-b12f5.firebaseapp.com", projectId: "sistema-de-tickets-ti-b12f5" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    
    let calendar, currentColl = "", localData = [], selectedId = "";

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut().then(() => location.reload()); }
    auth.onAuthStateChanged(u => { if(u){ document.getElementById('login').style.display='none'; document.getElementById('dashboard').style.display='block'; } });

    function abrir(id) {
        document.getElementById('panel-principal').style.display='none';
        document.querySelectorAll('.modulo').forEach(m => m.style.display='none');
        document.getElementById(id === 'inv_admin' || id === 'inv_salas' ? 'modulo_inv' : id).style.display='block';
        if(id === 'inv_admin' || id === 'inv_salas') {
            currentColl = (id === 'inv_admin') ? "inventario" : "inventario_salas";
            cargarInventario();
        }
        if(id === 'mod_calendario') initCalendar();
    }

    function volver() { document.getElementById('panel-principal').style.display='grid'; document.querySelectorAll('.modulo').forEach(m => m.style.display='none'); }

    // --- LOGICA CALENDARIO ---
    function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            locale: 'es',
            initialView: 'dayGridMonth',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listMonth' },
            events: async function(info, successCallback, failureCallback) {
                let eventos = [];
                // Consultar en ambas colecciones
                const colls = ["inventario", "inventario_salas"];
                for(let c of colls) {
                    const snap = await db.collectionGroup("mantenimientos").get();
                    snap.forEach(doc => {
                        const m = doc.data();
                        // Obtenemos datos del equipo padre para el nombre del responsable
                        eventos.push({
                            title: m.responsableEquipo || 'Mantenimiento',
                            start: m.fecha,
                            extendedProps: { campus: m.campus || 'BGA', dep: m.dependencia || '' },
                            display: 'block'
                        });
                    });
                }
                successCallback(eventos);
            },
            eventContent: function(arg) {
                let campus = arg.event.extendedProps.campus;
                let dep = arg.event.extendedProps.dep;
                return {
                    html: `<div class="event-bga">
                             <span class="badge-bga">${campus}</span>
                             <b>${arg.event.title}</b><br>
                             <small>${dep}</small>
                           </div>`
                };
            }
        });
        calendar.render();
    }

    // --- LOGICA MANTENIMIENTO (CONEXION AL CALENDARIO) ---
    function abrirMantenimiento(id) {
        selectedId = id;
        document.getElementById('modalMante').style.display = 'block';
    }

    async function guardarMantenimiento() {
        const equipo = localData.find(e => e.id === selectedId);
        // Guardamos en la subcolección para el historial del equipo
        await db.collection(currentColl).doc(selectedId).collection("mantenimientos").add({
            fecha: m_fecha.value,
            tipo: m_tipo.value,
            desc: m_desc.value,
            responsableEquipo: equipo.res, // Nombre del responsable para el calendario
            campus: equipo.cam,
            dependencia: equipo.dep
        });
        
        document.getElementById('modalMante').style.display = 'none';
        alert("Mantenimiento registrado y agregado al calendario");
    }

    // --- CARGA INVENTARIO ---
    function cargarInventario() {
        db.collection(currentColl).onSnapshot(snap => {
            localData = [];
            snap.forEach(doc => localData.push({id: doc.id, ...doc.data()}));
            renderTabla();
        });
    }

    function renderTabla() {
        const tbody = document.getElementById('tablaData');
        tbody.innerHTML = "";
        localData.forEach(e => {
            tbody.innerHTML += `<tr>
                <td><b>${e.pc}</b></td><td>${e.tipo}</td><td>${e.modelo}</td><td>${e.inv}</td><td>${e.res}</td><td>${e.dep}</td>
                <td>
                    <button class="btn-acc bg-tools" onclick="abrirMantenimiento('${e.id}')"><i class="fas fa-tools"></i></button>
                    </td>
            </tr>`;
        });
    }
</script>
</body>
</html>
